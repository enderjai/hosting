                        <button onclick="window.showEditPrecioEntradaModal()" class="text-xs text-blue-600 underline">Cambiar precio base</button>
                    </div>
                    <div class="bg-amber-50 dark:bg-amber-900/20 rounded-xl p-3">
                        <p class="text-sm font-semibold text-amber-800 dark:text-amber-300 mb-2">🎁 Descuento grupal</p>
                        <div class="flex gap-2 items-center text-sm">
                            <span>Mínimo</span>
                            <input type="number" id="gcMin" value="${grupoConfig.minPersonas}" min="1" class="w-16 px-2 py-1 border rounded-lg dark:bg-slate-700 text-center">
                            <span>personas · descuento por defecto</span>
                            <input type="number" id="gcDesc" value="${grupoConfig.descuentoDefault}" min="0" max="100" class="w-16 px-2 py-1 border rounded-lg dark:bg-slate-700 text-center">
                            <span>%</span>
                        </div>
                        <button onclick="grupoConfig.minPersonas=parseInt(document.getElementById('gcMin').value)||10; grupoConfig.descuentoDefault=parseInt(document.getElementById('gcDesc').value)||10; saveGrupoConfig(); alert('✅ Guardado');" class="mt-2 text-xs bg-amber-500 text-white px-3 py-1 rounded-lg">Guardar</button>
                    </div>
                    <div id="tiposList" class="space-y-2">${renderT()}</div>
                    <div class="border-t border-gray-200 dark:border-slate-700 pt-3">
                        <p class="text-sm font-semibold mb-2">Agregar tipo</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="tNombre" placeholder="Nombre (ej: Niño)" class="col-span-2 px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm">
                            <div><label class="text-xs text-gray-500">Factor (0.5 = 50%)</label>
                                <input type="number" id="tFactor" value="1" step="0.1" min="0" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm"></div>
                            <div><label class="text-xs text-gray-500">O precio fijo (deja 0 para usar factor)</label>
                                <input type="number" id="tPrecio" value="0" step="0.5" min="0" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm"></div>
                            <button onclick="window._addTipoEntrada()" class="col-span-2 bg-purple-600 text-white py-2 rounded-xl text-sm font-semibold">Agregar</button>
                        </div>
                    </div>
                </div>
            </div>`;
            document.body.appendChild(modal);
            window._toggleTipoEntrada = (i) => { tiposEntrada[i].activo = tiposEntrada[i].activo===false ? true : false; saveTiposEntrada(); document.getElementById('tiposList').innerHTML = renderT(); };
            window._deleteTipoEntrada = (i) => { if (!confirm('¿Eliminar tipo?')) return; tiposEntrada.splice(i,1); saveTiposEntrada(); document.getElementById('tiposList').innerHTML = renderT(); };
            window._addTipoEntrada = () => {
                const nombre = document.getElementById('tNombre')?.value?.trim();
                if (!nombre) { alert('Nombre obligatorio'); return; }
                const factor = parseFloat(document.getElementById('tFactor')?.value)||1;
                const precio = parseFloat(document.getElementById('tPrecio')?.value)||0;
                tiposEntrada.push({ id: Date.now(), nombre, factor, precio: precio > 0 ? precio : null, activo: true });
                saveTiposEntrada();
                document.getElementById('tiposList').innerHTML = renderT();
                document.getElementById('tNombre').value = '';
            };
        };

        window.showEditPrecioEntradaModal = function() {

        // Quick solicitud desde fila de inventario
        window._quickSolProd = function(prodId) {
            const p = inventory.find(x => x.id === prodId);
            if (!p) return;
            const qty = prompt(`¿Cuántas unidades de "${p.nombre}" necesitas del almacén?\n(Disponible en almacén: ${p.stock_almacen||0})`, '1');
            if (!qty || isNaN(parseInt(qty)) || parseInt(qty) <= 0) return;
            const motivo = prompt('Motivo (opcional):') || '';
            const newId = solicitudesInv.length ? Math.max(...solicitudesInv.map(s=>s.id)) + 1 : 1;
            solicitudesInv.push({
                id: newId, tipo: 'pedido', estado: 'pendiente',
                producto_id: prodId, producto_nombre: p.nombre,
                cantidad: parseInt(qty), motivo,
                usuario_id: currentUser?.id, usuario_nombre: currentUser?.nombre,
                fecha: new Date().toISOString()
            });
            saveSolicitudes();
            alert(`✅ Solicitud de ${qty} "${p.nombre}" enviada al administrador`);
        };

        function renderProfitsView() {
            if (currentUser?.role !== 'admin') { currentView = 'sales'; render(); return; }
            const totalSales = sales.reduce((sum, s) => sum + (s.total || 0), 0);
            const totalProfit = sales.reduce((sum, s) => sum + (s.ganancia || 0), 0);
            const monthlyProfit = sales.filter(s => new Date(s.fecha).getMonth() === new Date().getMonth()).reduce((sum, s) => sum + (s.ganancia || 0), 0);
            const monthlyVariableCosts = getTotalVariableCosts(
                new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString(),
                new Date().toISOString()
            );
            const netProfit = monthlyProfit - monthlyVariableCosts;
            
            const container = document.getElementById('viewContainer');
            if (!container) return;
            
            container.innerHTML = `
                <div class="animate-slide-in">
                    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Ganancias y Finanzas</h1>

                        ${getWidget('📈', 'Ganancia Bruta', `$${totalProfit.toFixed(2)}`, 'sin costos variables', 'text-emerald-600')}
                        ${getWidget('📊', 'Ganancia Mensual', `$${monthlyProfit.toFixed(2)}`, 'ventas del mes', 'text-emerald-600')}
                        ${getWidget('🎯', 'Ganancia Neta', `$${netProfit.toFixed(2)}`, 'después de costos', 'text-purple-600')}
                    </div>

                            `).join('')}
                        </div>

                </div>

        window.exportToExcel = function(type) {
            let data = [];
            let sheetName = type;
            if (type === 'inventory') {
                data = inventory.map(p => ({
                    'SKU': p.sku || '',
                    'Producto/Nombre': p.nombre || '',
                    'Categoría': p.categoria || '',
                    'Descripción': p.descripcion || '',
                    'Stock_Almacen': p.stock_almacen || 0,
                    'Stock_PuntoVenta': p.stock_puntoventa || 0,
                    'Precio_Compra': parseFloat((p.precio_compra || 0).toFixed(2)),
                    'Precio_Venta': parseFloat((p.precio_venta || 0).toFixed(2)),
                    'Código_Barras': p.codigo_barras || '',
                    'Proveedor': p.proveedores && p.proveedores[0] ? p.proveedores[0].nombre : '',
                    'Elasticidad': parseFloat((p.elasticidad || 1.0).toFixed(2)),
                    'Icono/Imagen': p.imagen || '📦'
                }));
            } else if (type === 'movements') {
                data = movements;
            } else if (type === 'sales') {
                data = sales;
            } else if (type === 'variablecosts') {
                data = variableCosts;
            }
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, `${type}_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        window._scanSearch = function(q) {
            const drop = document.getElementById('scanDropdown');
            if (!drop) return;
            if (!q.trim()) { drop.classList.add('hidden'); return; }
            const results = inventory.filter(p =>
                normalizarTexto(p.nombre||'').includes(normalizarTexto(q)) ||
                (p.codigo_barras||'').includes(q) || (p.sku||'').toLowerCase().includes(q.toLowerCase())
            ).slice(0, 6);
            if (!results.length) { drop.classList.add('hidden'); return; }
            drop.innerHTML = results.map(p => `
                <button onclick="window._selScanProduct(${p.id})"
                    class="w-full flex items-center gap-2 px-3 py-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-xl text-left">

            window._currentScanProductId = prodId;
            document.getElementById('scanProdImg').textContent = p.imagen||'📦';
            document.getElementById('scanProdNombre').textContent = p.nombre;
            document.getElementById('scanProdStock').textContent = `Almacén: ${p.stock_almacen||0} · Punto de venta: ${p.stock_puntoventa||0}`;
            document.getElementById('scanProductBox').classList.remove('hidden');
            document.getElementById('scanDropdown').classList.add('hidden');
            document.getElementById('scanManual').value = '';
            document.getElementById('scanQty').value = 1;
            document.getElementById('scanMotivo').value = '';

        };

        window._registrarScan = function() {
            const pid = window._currentScanProductId;
            if (!pid) { alert('Selecciona un producto primero'); return; }
            const p = inventory.find(x => x.id === pid);
            if (!p) return;
            const qty = parseInt(document.getElementById('scanQty')?.value) || 1;
            const motivo = document.getElementById('scanMotivo')?.value?.trim() || '';
            if (qty <= 0) { alert('La cantidad debe ser mayor a 0'); return; }

            const origen = scanMode==='salida' ? 'punto_venta' : 'almacen';
            const destino = scanMode==='salida' ? 'salida_manual' : 'punto_venta';

            if (scanMode === 'salida') {
                const stockDisp = (p.stock_almacen||0)+(p.stock_puntoventa||0);
                if (qty > stockDisp) { alert(`Stock insuficiente. Solo hay ${stockDisp} unidades.`); return; }
                const pvDesc = Math.min(p.stock_puntoventa||0, qty);
                p.stock_puntoventa = (p.stock_puntoventa||0) - pvDesc;
                const resto = qty - pvDesc;
                if (resto > 0) p.stock_almacen = (p.stock_almacen||0) - resto;
            } else {
                p.stock_almacen = (p.stock_almacen||0) + qty;
            }
            registerMovement(pid, scanMode==='salida'?'Salida Manual':'Entrada Manual', qty, origen, destino, motivo||'Registro por escáner');
            saveData();

            scanLog.push({ tipo: scanMode, productoId: pid, nombre: p.nombre, imagen: p.imagen||'📦', cantidad: qty, motivo, fecha: new Date().toISOString() });

            // Flash en la caja
            const box = document.getElementById('scanProductBox');
            if (box) {
                const orig = box.className;
                box.style.borderColor = scanMode==='salida'?'#ef4444':'#10b981';
                box.style.background = scanMode==='salida'?'rgba(239,68,68,0.15)':'rgba(16,185,129,0.15)';
                setTimeout(() => { box.style.borderColor=''; box.style.background=''; }, 400);
            }

            document.getElementById('scanProdStock').textContent = `Almacén: ${p.stock_almacen||0} · Punto de venta: ${p.stock_puntoventa||0}`;
            // Actualizar log sin re-renderizar todo
            const logEl = document.getElementById('scanDropdown');
            renderScanEntradaView();
            // Re-seleccionar el mismo producto
            setTimeout(()=>window._selScanProduct(pid), 50);
        };

                for (const p of (s.productos||[])) {

                }
            }
            const masVendidos = Object.entries(rankVentas)
                .sort((a,b)=>b[1]-a[1])

                .filter(x=>x.producto);

            // Productos sin movimiento en 30+ días
            const hace30 = new Date(Date.now()-30*24*3600*1000).toISOString();

                return ultimo < hace30;

            // Mayor margen porcentual
            const mayorMargen = [...inventory]
                .filter(p => (p.precio_venta||0) > 0 && (p.precio_compra||0) > 0)

                    ...p,

            for (let i=6; i>=0; i--) {

        // ══════════════════════════════════════════════════
        // 🧠  DASHBOARD EXPERTO (Análisis Financiero)
        // ══════════════════════════════════════════════════
        function renderDashboardExperto() {
            if (currentUser?.role !== 'admin') { currentView='dashboard'; render(); return; }
            const container = document.getElementById('viewContainer');
            if (!container) return;

            // ── Métricas base ──
            const totalSales = sales.reduce((s,v)=>s+(v.total||0), 0);
            const totalCOGS  = sales.reduce((s,v)=>s+(v.total||0)-(v.ganancia||0), 0);
            const totalGananciaBruta = totalSales - totalCOGS;
            const resumen = calcularResumenCostos();
            const costosEstructurales = resumen.mensual * (sales.length > 0
                ? Math.max(1, (new Date()-new Date(sales[0]?.fecha||Date.now())) / (30*24*3600*1000)) : 1);
            const gananciaOperativa = totalGananciaBruta - costosEstructurales;
            const margenBrutoPct    = totalSales > 0 ? (totalGananciaBruta/totalSales*100) : 0;
            const margenOperativoPct= totalSales > 0 ? (gananciaOperativa/totalSales*100) : 0;

            const valorInventario = inventory.reduce((s,p)=>s+(p.precio_compra||0)*((p.stock_almacen||0)+(p.stock_puntoventa||0)), 0);
            const valorInventarioVenta = inventory.reduce((s,p)=>s+(p.precio_venta||0)*((p.stock_almacen||0)+(p.stock_puntoventa||0)), 0);
            const rotacionInventario = valorInventario > 0 ? totalCOGS / valorInventario : 0;
            const diasInventario     = rotacionInventario > 0 ? 365/rotacionInventario : 0;

            const numVentas     = sales.length;
            const ticketPromedio = numVentas > 0 ? totalSales/numVentas : 0;
            const gananciaPromedio = numVentas > 0 ? totalGananciaBruta/numVentas : 0;

            const totalPersonas = (peopleCount.history||[]).filter(h=>h.accion==='entrada').reduce((s,h)=>s+(h.cantidad||0),0);
            const ingresoPersonas = (peopleCount.history||[]).filter(h=>h.accion==='entrada').reduce((s,h)=>s+(h.cobrado||0),0);
            const ingresoPorPersona = totalPersonas > 0 ? ingresoPersonas/totalPersonas : 0;
            const ingresoPorPersonaConVenta = totalPersonas > 0 ? (totalSales+ingresoPersonas)/totalPersonas : 0;

            const productosSinStock = inventory.filter(p=>(p.stock_almacen||0)+(p.stock_puntoventa||0)===0).length;
            const productosBajoStock = inventory.filter(p=>{const t=(p.stock_almacen||0)+(p.stock_puntoventa||0); return t>0&&t<5;}).length;
            const roiInventario = valorInventario > 0 ? (totalGananciaBruta/valorInventario*100) : 0;

            const puntoEquilibrio = resumen.mensual > 0
                ? (margenBrutoPct > 0 ? resumen.mensual / (margenBrutoPct/100) : null) : null;

            const kpi = (icon, titulo, valor, subtitulo, color='text-gray-800') => `

                        <span class="text-xs text-gray-400 text-right leading-tight max-w-[60%]">${subtitulo}</span>
                    </div>
                    <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">${titulo}</p>
                    <p class="font-black text-xl ${color}">${valor}</p>
                </div>`;

            const semaforo = (val, bueno, malo) => val >= bueno ? '🟢' : val >= malo ? '🟡' : '🔴';

            container.innerHTML = `
            <div class="animate-slide-in space-y-5">

                    <div>
                        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">🧠 Análisis Financiero Experto</h1>

                        ${kpi('📉','Margen operativo',`${margenOperativoPct.toFixed(1)}%`,`${semaforo(margenOperativoPct,15,5)} después de costos fijos`, margenOperativoPct>=15?'text-emerald-600':margenOperativoPct>=5?'text-amber-600':'text-red-600')}
                        ${kpi('🎯','Ganancia bruta',`$${totalGananciaBruta.toFixed(0)}`,'ventas − costo productos','text-emerald-600')}

                        ${kpi('📅','Días de inventario',diasInventario>0?`${Math.round(diasInventario)} días`:'—',`${semaforo(365-diasInventario,300,200)} días promedio para agotar stock`,'text-blue-600')}
                        ${kpi('💎','Valor del inventario (costo)',`$${valorInventario.toFixed(0)}`,'capital invertido en productos','text-gray-800 dark:text-white')}
                        ${kpi('📤','Valor potencial de venta',`$${valorInventarioVenta.toFixed(0)}`,'si se vende todo al precio actual','text-indigo-600')}

                        ${kpi('👥','Personas totales',totalPersonas.toString(),'entradas registradas al balneario','text-teal-600')}
                        ${kpi('💵','Gasto promedio por persona',`$${ingresoPorPersonaConVenta.toFixed(2)}`,'entradas + ventas de productos','text-purple-600')}

                <!-- ROI Y PUNTO DE EQUILIBRIO -->

                    <div class="space-y-3">
                        ${[

                            ['Margen operativo', margenOperativoPct>=15?'🟢 Sólido (>15%)':margenOperativoPct>=5?'🟡 Ajustado (5-15%)':'🔴 En riesgo (<5%) — reducir costos fijos'],
                            ['Rotación inventario', rotacionInventario>=4?'🟢 Ágil (>4x)':rotacionInventario>=2?'🟡 Normal (2-4x)':'🔴 Lento (<2x) — hay producto estancado'],

                            ['Punto de equilibrio', puntoEquilibrio ? (totalSales>=puntoEquilibrio?`🟢 Superado — vendes $${(totalSales-puntoEquilibrio).toFixed(0)} sobre el punto`:`🔴 No alcanzado — faltan $${(puntoEquilibrio-totalSales).toFixed(0)}`) : '⚪ Sin datos de costos fijos'],
                        ].map(([label,estado])=>`

        // ══════════════════════════════════════════════════
        // 💾  ALMACENAMIENTO ADICIONAL
        // ══════════════════════════════════════════════════

        // Clave de configuración de backends adicionales
        const EXTRA_STORAGE_KEY = 'sf_extra_storage';
        function getExtraStorage() { return JSON.parse(localStorage.getItem(EXTRA_STORAGE_KEY)||'{}'); }
        function saveExtraStorageConfig(cfg) { localStorage.setItem(EXTRA_STORAGE_KEY, JSON.stringify(cfg)); }

        // ── 1. JSONBin.io (REST API gratuita) ──────────────
        async function syncToJSONBin() {
            const cfg = getExtraStorage();
            if (!cfg.jsonbin_key || !cfg.jsonbin_bin_id) return;
            const data = buildExportData();
            const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.jsonbin_bin_id}`, {
                method: 'PUT',
                headers: { 'Content-Type':'application/json', 'X-Master-Key': cfg.jsonbin_key },
                body: JSON.stringify({ data, updated: new Date().toISOString() })
            });
            if (!res.ok) throw new Error('JSONBin error: ' + res.status);
        }

        async function loadFromJSONBin() {
            const cfg = getExtraStorage();
            if (!cfg.jsonbin_key || !cfg.jsonbin_bin_id) return null;
            const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.jsonbin_bin_id}/latest`, {
                headers: { 'X-Master-Key': cfg.jsonbin_key, 'X-Bin-Meta': 'false' }
            });
            if (!res.ok) throw new Error('JSONBin error: ' + res.status);
            const json = await res.json();
            return json.record?.data || json.record;
        }

        // ── 2. GitHub Gist ─────────────────────────────────
        async function syncToGist() {
            const cfg = getExtraStorage();
            if (!cfg.gist_token || !cfg.gist_id) return;
            const data = buildExportData();
            const res = await fetch(`https://api.github.com/gists/${cfg.gist_id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${cfg.gist_token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    files: { 'stockflow_backup.json': { content: JSON.stringify({ data, updated: new Date().toISOString() }, null, 2) } }
                })
            });
            if (!res.ok) throw new Error('Gist error: ' + res.status);
        }

        async function loadFromGist() {
            const cfg = getExtraStorage();
            if (!cfg.gist_token || !cfg.gist_id) return null;
            const res = await fetch(`https://api.github.com/gists/${cfg.gist_id}`, {
                headers: { 'Authorization': `token ${cfg.gist_token}` }
            });
            if (!res.ok) throw new Error('Gist error: ' + res.status);
            const json = await res.json();
            const content = json.files?.['stockflow_backup.json']?.content;
            return content ? JSON.parse(content)?.data : null;
        }

        // ── 3. Google Sheets via Apps Script ───────────────
        async function syncToGoogleSheets() {
            const cfg = getExtraStorage();
            if (!cfg.gsheets_url) return;
            const data = buildExportData();
            await fetch(cfg.gsheets_url, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'save', data, timestamp: new Date().toISOString() })
            });
            // no-cors: no podemos leer la respuesta, pero se guarda
        }

        // ── 4. Backup local automático (archivo JSON) ───────
        function autoBackupToFile() {
            const data = buildExportData();
            const blob = new Blob([JSON.stringify({ data, exported: new Date().toISOString() }, null, 2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `stockflow_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function buildExportData() {
            return { inventory, sales: sales.slice(-500), movements: movements.slice(-500),
                recipes, users: users.map(u=>({...u, password:'***'})),
                variableCosts, costos, empleados, solicitudesInv, categorias,
                agrupaciones, peopleCount, tiposEntrada, grupoConfig, precioEntrada };

        // Colecciones Firestore
        const COL = {
            inventory:     'inventory',
            sales:         'sales',
            movements:     'movements',
            recipes:       'recipes',
            users:         'users',
            variableCosts: 'variableCosts',
            solicitudes:   'solicitudesInv',

        // ── Inicializar Firebase ────────────────────────────────
        async function initFirebase() {
            const cfg = getFirebaseConfig();
            if (!cfg?.projectId) { showSyncStatus('offline'); return; }
            try {
                showSyncStatus('connecting');
                if (!firebase.apps.length) {
                    firebaseApp = firebase.initializeApp(cfg);
                } else {
                    firebaseApp = firebase.apps[0];
                }
                db = firebase.firestore();
                // Persistencia offline — funciona sin internet
                await db.enablePersistence({ synchronizeTabs: true }).catch(e => {
                    if (e.code !== 'failed-precondition' && e.code !== 'unimplemented') throw e;
                });
                syncEnabled = true;
                // Carga inicial
                await loadAllFromFirestore();
                setupRealtimeListeners();
                showSyncStatus('online');
            } catch (err) {
                console.warn('Firebase error:', err.message);
                showSyncStatus('error', err.message);
            }
        }

        // ── Cargar todo desde Firestore ─────────────────────────
        async function loadAllFromFirestore() {
            if (!db) return;
            const [invSnap, salesSnap, movSnap, recSnap, usrSnap, vcSnap, solSnap, empSnap, cosSnap] = await Promise.all([
                db.collection(COL.inventory).get(),
                db.collection(COL.sales).get(),
                db.collection(COL.movements).get(),
                db.collection(COL.recipes).get(),
                db.collection(COL.users).get(),
                db.collection(COL.variableCosts).get(),
                db.collection(COL.solicitudes).get(),
                db.collection(COL.empleados).get(),
                db.collection(COL.costos).get(),
            ]);

            const snap2arr = snap => snap.docs.map(d => d.data());

            if (!invSnap.empty) inventory = snap2arr(invSnap);
            if (!salesSnap.empty) sales = snap2arr(salesSnap);
            if (!movSnap.empty) movements = snap2arr(movSnap);
            if (!recSnap.empty) recipes = snap2arr(recSnap);
            if (!usrSnap.empty) users = snap2arr(usrSnap);
            if (!vcSnap.empty) variableCosts = snap2arr(vcSnap);
            if (!solSnap.empty) solicitudesInv = snap2arr(solSnap);
            if (!empSnap.empty) empleados = snap2arr(empSnap);
            if (!cosSnap.empty) costos = snap2arr(cosSnap);

            // Config docs
            const [catDoc, agDoc, pcDoc, teDoc, gcDoc, peDoc] = await Promise.all([
                db.collection(COL.config).doc('categorias').get(),
                db.collection(COL.config).doc('agrupaciones').get(),
                db.collection(COL.config).doc('peopleCount').get(),
                db.collection(COL.config).doc('tiposEntrada').get(),
                db.collection(COL.config).doc('grupoConfig').get(),
                db.collection(COL.config).doc('precioEntrada').get(),
            ]);
            if (catDoc.exists) categorias = catDoc.data().items;
            if (agDoc.exists) agrupaciones = agDoc.data().items;
            if (pcDoc.exists) peopleCount = pcDoc.data();
            if (teDoc.exists) tiposEntrada = teDoc.data().items;
            if (gcDoc.exists) grupoConfig = gcDoc.data();
            if (peDoc.exists) precioEntrada = peDoc.data().valor;

            // Sync to localStorage as offline cache
            _cacheToLocalStorage();
            render();
        }

        // ── Listeners en tiempo real ────────────────────────────
        function setupRealtimeListeners() {
            if (!db) return;
            // Detach any existing listeners
            unsubscribers.forEach(u => u());
            unsubscribers = [];

            const listenCol = (col, varSetter, rerender) => {
                const unsub = db.collection(col).onSnapshot(snap => {
                    if (snap.metadata.hasPendingWrites) return; // skip local writes
                    const data = snap.docs.map(d => d.data());
                    varSetter(data);
                    _cacheToLocalStorage();
                    if (rerender) { try { rerender(); } catch(e){} }
                }, err => console.warn('Listener error:', err));
                unsubscribers.push(unsub);
            };

            listenCol(COL.inventory, d => { inventory = d; }, () => {
                if (currentView === 'inventory') renderInventoryView();
                if (currentView === 'sales') renderSalesView();
            });
            listenCol(COL.sales, d => { sales = d; }, null);
            listenCol(COL.solicitudes, d => {
                solicitudesInv = d;
                // Update badges
                const el = document.querySelector('[data-sol-badge]');
                const pend = solicitudesInv.filter(s=>s.estado==='pendiente').length;
                if (el) el.textContent = pend > 0 ? pend : '';
                if (currentView === 'admin_requests') renderAdminRequestsView();
                if (currentView === 'emp_requests') renderEmpRequestsView();
                if (currentView === 'emp_conteo') renderEmpConteoView();
            }, null);

            // Config doc listener
            const cfgUnsub = db.collection(COL.config).onSnapshot(snap => {
                snap.docChanges().forEach(change => {
                    const d = change.doc;
                    if (d.id === 'categorias') categorias = d.data().items;
                    if (d.id === 'agrupaciones') agrupaciones = d.data().items;
                    if (d.id === 'peopleCount') peopleCount = d.data();
                    if (d.id === 'tiposEntrada') tiposEntrada = d.data().items;
                    if (d.id === 'grupoConfig') grupoConfig = d.data();
                    if (d.id === 'precioEntrada') precioEntrada = d.data().valor;
                });
            });
            unsubscribers.push(cfgUnsub);
        }

        // ── Guardar datos (localStorage + Firestore) ─────────────
        const _origSaveData = saveData;
        saveData = async function() {
            // Siempre guardar localmente (funciona offline)
            _origSaveData();
            if (!db || !syncEnabled) return;
            try {
                const batch = db.batch();
                const upsert = (col, arr) => {
                    arr.forEach(item => {
                        if (item?.id === undefined) return;
                        batch.set(db.collection(col).doc(String(item.id)), item, { merge: true });
                    });
                };
                upsert(COL.inventory, inventory);
                upsert(COL.sales, sales.slice(-500));       // últimas 500 ventas
                upsert(COL.movements, movements.slice(-500));
                upsert(COL.recipes, recipes);
                upsert(COL.variableCosts, variableCosts);
                upsert(COL.solicitudes, solicitudesInv);
                upsert(COL.empleados, empleados);
                upsert(COL.costos, costos);
                // Config docs
                batch.set(db.collection(COL.config).doc('categorias'), { items: categorias });
                batch.set(db.collection(COL.config).doc('agrupaciones'), { items: agrupaciones });
                batch.set(db.collection(COL.config).doc('peopleCount'), peopleCount);
                batch.set(db.collection(COL.config).doc('tiposEntrada'), { items: tiposEntrada });
                batch.set(db.collection(COL.config).doc('grupoConfig'), grupoConfig);
                batch.set(db.collection(COL.config).doc('precioEntrada'), { valor: precioEntrada });
                await batch.commit();
                showSyncStatus('online');
            } catch (err) {
                console.warn('Sync error:', err.message);
                showSyncStatus('error', 'Error al sincronizar: ' + err.message.slice(0,60));
            }
        };

        // También guardar usuarios por separado (con seguridad)
        async function saveUsers() {
            localStorage.setItem('users', JSON.stringify(users));
            if (!db || !syncEnabled) return;
            const batch = db.batch();
            users.forEach(u => {
                const safeUser = { ...u };
                batch.set(db.collection(COL.users).doc(String(u.id)), safeUser, { merge: true });
            });
            await batch.commit().catch(e => console.warn('User sync error:', e.message));
        }

        function _cacheToLocalStorage() {
            try {
                localStorage.setItem('inventory', JSON.stringify(inventory));
                localStorage.setItem('sales', JSON.stringify(sales));
                localStorage.setItem('movements', JSON.stringify(movements));
                localStorage.setItem('recipes', JSON.stringify(recipes));
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('variableCosts', JSON.stringify(variableCosts));
                localStorage.setItem('solicitudesInv', JSON.stringify(solicitudesInv));
                localStorage.setItem('empleados', JSON.stringify(empleados));
                localStorage.setItem('costos', JSON.stringify(costos));
                localStorage.setItem('categorias', JSON.stringify(categorias));
                localStorage.setItem('agrupaciones', JSON.stringify(agrupaciones));
                localStorage.setItem('peopleCount', JSON.stringify(peopleCount));
                localStorage.setItem('tiposEntrada', JSON.stringify(tiposEntrada));

        // ── Indicador de estado de sincronización ─────────────────

                connecting:  { bg:'bg-blue-500',    icon:'fa-rotate fa-spin', text:'Conectando…', auto_hide: false },
                syncing:     { bg:'bg-amber-400',   icon:'fa-arrows-rotate fa-spin', text:'Guardando…', auto_hide: true },
                error:       { bg:'bg-red-500',     icon:'fa-exclamation-triangle', text: msg||'Error de sync', auto_hide: false },

            const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];

            let barcodeBuffer = '';
            let lastKeyTime = 0;
            const SCANNER_SPEED_MS = 80; // Los scanners escriben < 80ms entre teclas

            document.addEventListener('keydown', (e) => {
                // No capturar si hay un input/textarea enfocado (excepto el de POS)
                const active = document.activeElement;
                const isInputFocused = active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName)
                    && active.id !== 'posSearch' && active.id !== 'barcodeGlobal';

                const now = Date.now();
                const isScanner = (now - lastKeyTime) < SCANNER_SPEED_MS || barcodeBuffer.length > 0;

                if (isInputFocused && !isScanner) return;

                if (e.key === 'Enter' && barcodeBuffer.length > 3) {
                    e.preventDefault();
                    processBarcodeInput(barcodeBuffer.trim());
                    barcodeBuffer = '';
                    lastKeyTime = 0;
                    return;
                }
                if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                    barcodeBuffer += e.key;
                    lastKeyTime = now;
                    // Auto-clear after 500ms of inactivity
                    setTimeout(() => {
                        if (Date.now() - lastKeyTime >= 450) barcodeBuffer = '';
                    }, 500);
                }
            });

            function processBarcodeInput(code) {
                const product = inventory.find(p =>
                    p.codigo_barras === code ||
                    p.sku === code ||
                    String(p.id) === code
                );
                if (!product) {
                    // Flash and show not-found toast
                    showBarcodeToast(`❌ Código no encontrado: ${code}`, false);
                    return;
                }

                if (currentView === 'sales') {
                    // Agregar al carrito POS
                    window.posAddProduct && window.posAddProduct(product.id);
                    showBarcodeToast(`✅ ${product.imagen||'📦'} ${product.nombre} agregado`, true);
                } else if (currentView === 'inventory') {
                    // Resaltar en tabla
                    showBarcodeToast(`🔍 ${product.nombre} — Stock: ${(product.stock_almacen||0)+(product.stock_puntoventa||0)}`, true);
                    setTimeout(() => {
                        const rows = document.querySelectorAll('#inventoryTableBody tr');
                        rows.forEach(row => {
                            if (row.textContent.includes(product.nombre || '')) {
                                row.scrollIntoView({ behavior:'smooth', block:'center' });
                                row.classList.add('barcode-flash');
                                setTimeout(() => row.classList.remove('barcode-flash'), 600);
                            }
                        });
                    }, 100);
                } else {
                    showBarcodeToast(`📦 ${product.nombre} — $${(product.precio_venta||0).toFixed(2)}`, true);
                }
            }

            function showBarcodeToast(msg, success) {
                let toast = document.getElementById('barcodeToast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'barcodeToast';
                    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;transition:all 0.3s;pointer-events:none;';
                    document.body.appendChild(toast);
                }
                toast.innerHTML = `<div class="px-5 py-3 rounded-2xl shadow-2xl text-white font-semibold text-sm ${success ? 'bg-emerald-600' : 'bg-red-600'}">${msg}</div>`;
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2500);
            }
        })();


        // ══════════════════════════════════════════════════════════
        // ████  IMPRESORA DE TICKETS + CAJÓN — ESC/POS  ████
        // ══════════════════════════════════════════════════════════

        let posSerialPort = null;
        let posWriter = null;

        const ESC = 0x1B; const GS = 0x1D;
        // Comandos ESC/POS
        const CMD = {
            INIT:          [ESC, 0x40],
            CENTER:        [ESC, 0x61, 0x01],
            LEFT:          [ESC, 0x61, 0x00],
            BOLD_ON:       [ESC, 0x45, 0x01],
            BOLD_OFF:      [ESC, 0x45, 0x00],
            DOUBLE_ON:     [GS, 0x21, 0x11],
            DOUBLE_OFF:    [GS, 0x21, 0x00],
            SMALL:         [ESC, 0x21, 0x01],
            NORMAL:        [ESC, 0x21, 0x00],
            FEED3:         [ESC, 0x64, 0x03],
            FEED1:         [ESC, 0x64, 0x01],
            CUT:           [GS, 0x56, 0x42, 0x00],
            OPEN_DRAWER:   [ESC, 0x70, 0x00, 0x19, 0xFA],
        };

        function encodeText(str) {
            return new TextEncoder().encode(str);
        }

        function buildBytes(...parts) {
            const total = parts.reduce((s,p) => s + (Array.isArray(p) ? p.length : p.length), 0);
            const buf = new Uint8Array(total);
            let off = 0;
            for (const p of parts) {
                if (Array.isArray(p)) { buf.set(p, off); off += p.length; }
                else { buf.set(p, off); off += p.length; }
            }
            return buf;
        }

        function line(text, width=42) {
            return encodeText((text + ' '.repeat(Math.max(0, width - text.length))).slice(0, width) + '\n');
        }
        function divider(char='-', width=42) { return encodeText(char.repeat(width) + '\n'); }
        function centerLine(text, width=42) {
            const pad = Math.max(0, Math.floor((width - text.length) / 2));
            return encodeText(' '.repeat(pad) + text + '\n');
        }
        function priceRow(label, price, width=42) {
            const priceStr = '$' + price.toFixed(2);
            const labelTrunc = label.slice(0, width - priceStr.length - 1);
            return encodeText(labelTrunc + ' '.repeat(width - labelTrunc.length - priceStr.length) + priceStr + '\n');
        }

        async function connectPrinter() {
            if (!('serial' in navigator)) {
                alert('⚠️ Tu navegador no soporta Web Serial API.\nUsa Google Chrome o Edge en PC para conectar la impresora.\n\nComo alternativa, puedes imprimir con Ctrl+P.');
                return false;
            }
            try {
                posSerialPort = await navigator.serial.requestPort();
                const baudRate = parseInt(localStorage.getItem('sf_printer_baud') || '9600');
                await posSerialPort.open({ baudRate });
                posWriter = posSerialPort.writable.getWriter();
                localStorage.setItem('sf_printer_connected', '1');
                alert('✅ Impresora conectada correctamente');
                return true;
            } catch (err) {
                alert('No se pudo conectar: ' + err.message);
                return false;
            }
        }

        async function disconnectPrinter() {
            try {
                if (posWriter) { posWriter.releaseLock(); posWriter = null; }
                if (posSerialPort) { await posSerialPort.close(); posSerialPort = null; }
            } catch(e) {}
        }

        async function sendToPrinter(bytes) {
            if (!posWriter) {
                // Fallback: browser print
                printReceiptBrowser();
                return;
            }
            try {
                await posWriter.write(bytes);
            } catch (err) {
                console.warn('Printer write error:', err.message);
                printReceiptBrowser();
            }
        }

        async function openCashDrawer() {
            if (!posWriter) {
                alert('Cajón no conectado. Conecta la impresora primero (el cajón se conecta a través de la impresora).');
                return;
            }
            const cmd = buildBytes(CMD.OPEN_DRAWER);
            await sendToPrinter(cmd).catch(console.warn);
        }

        // Generar ticket ESC/POS como bytes
        function buildReceiptBytes(sale, items, metodo) {
            const posConfig = getPOSConfig();
            const fecha = new Date(sale.fecha || Date.now());
            const fechaStr = fecha.toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'short' });
            const partes = [];

            partes.push(buildBytes(CMD.INIT));
            partes.push(buildBytes(CMD.CENTER));
            partes.push(buildBytes(CMD.BOLD_ON, CMD.DOUBLE_ON));
            partes.push(encodeText((posConfig.nombre || 'MI NEGOCIO') + '\n'));
            partes.push(buildBytes(CMD.DOUBLE_OFF, CMD.BOLD_OFF));
            if (posConfig.subtitulo) partes.push(encodeText(posConfig.subtitulo + '\n'));
            if (posConfig.rfc) partes.push(encodeText('RFC: ' + posConfig.rfc + '\n'));
            partes.push(buildBytes(CMD.LEFT));
            partes.push(buildBytes(CMD.FEED1));
            partes.push(divider());
            partes.push(encodeText(`Ticket #${sale.id}      ${fechaStr}\n`));
            partes.push(encodeText(`Cajero: ${currentUser?.nombre || '—'}\n`));
            partes.push(divider());

            for (const item of items) {
                const subtotal = (item.precio_venta || 0) * (item.cantidad || 1);
                const nombreTrunc = (item.nombre || '').slice(0, 28);
                partes.push(encodeText(`${nombreTrunc}\n`));
                partes.push(priceRow(`  ${item.cantidad}x $${(item.precio_venta||0).toFixed(2)}`, subtotal));
            }

            partes.push(divider('='));
            partes.push(buildBytes(CMD.BOLD_ON));
            partes.push(priceRow('TOTAL', sale.total || 0));
            partes.push(buildBytes(CMD.BOLD_OFF));
            partes.push(encodeText(`Pago: ${metodo || 'efectivo'}\n`));

            if ((sale.billete_pago||0) > 0) {
                partes.push(priceRow('Efectivo entregado', sale.billete_pago));
                partes.push(priceRow('Cambio', sale.cambio_dado || 0));
            }

            partes.push(divider());
            partes.push(buildBytes(CMD.CENTER));
            partes.push(encodeText((posConfig.mensaje_final || '¡Gracias por su visita!') + '\n'));
            if (posConfig.telefono) partes.push(encodeText('Tel: ' + posConfig.telefono + '\n'));
            partes.push(buildBytes(CMD.FEED3));
            partes.push(buildBytes(CMD.CUT));

            const totalLen = partes.reduce((s, p) => s + p.length, 0);
            const result = new Uint8Array(totalLen);
            let off = 0;
            for (const p of partes) { result.set(p, off); off += p.length; }
            return result;
        }

        function printReceiptBrowser() {
            const el = document.getElementById('receiptPrint');
            if (!el) return;
            el.style.display = 'block';
            window.print();
            setTimeout(() => { el.style.display = 'none'; }, 1000);

        // Función principal de impresión de ticket
        async function printReceipt(sale, items, metodo) {
            const posConfig = getPOSConfig();
            if (!posConfig.print_enabled) return;

            // Insertar HTML de recibo (para fallback de navegador)
            let receiptEl = document.getElementById('receiptPrint');
            if (receiptEl) receiptEl.remove();
            const div = document.createElement('div');
            div.innerHTML = buildReceiptHTML(sale, items, metodo);
            document.body.appendChild(div.firstElementChild);

            if (posWriter) {
                // ESC/POS directo
                const bytes = buildReceiptBytes(sale, items, metodo);
                await sendToPrinter(bytes);
            } else if (posConfig.print_browser) {
                printReceiptBrowser();
            }
        }

                        </div>
                    </div>
                    ${fbCfg.projectId ? `<p class="text-sm text-gray-500 mb-3">Proyecto: <strong>${fbCfg.projectId}</strong></p>` : ''}
                    <div class="flex gap-3 flex-wrap">
                        <button onclick="window.showFirebaseSetupModal()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-semibold">
                            ${fbCfg.projectId ? '✏️ Cambiar configuración' : '🔌 Configurar Firebase'}
                        </button>
                        ${syncEnabled ? `
                        <button onclick="saveData().then(()=>alert('✅ Datos subidos'))" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold">
                            📤 Subir datos locales
                        </button>
                        <button onclick="loadAllFromFirestore().then(()=>alert('✅ Datos descargados'))" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold">
                            📥 Descargar desde nube
                        </button>` : ''}
                    </div>
                    <div class="mt-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3 text-xs text-blue-800 dark:text-blue-300">
                        <strong>¿Por qué Firebase?</strong> Es gratuito para negocios pequeños (hasta 50,000 lecturas/día), funciona offline y sincroniza automáticamente al volver a tener internet. Tus datos están en la nube de Google, seguros y accesibles desde tu celular, tablet o cualquier computadora.
                    </div>
                </div>

                <!-- POS Hardware -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-5">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-2xl">🖨️</span>
                        <div>
                            <h2 class="font-bold text-gray-800 dark:text-white">Hardware de Punto de Venta</h2>
                            <p class="text-sm text-gray-500">Impresora de tickets, cajón de efectivo, lector de código de barras</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div class="bg-gray-50 dark:bg-slate-700 rounded-xl p-4 text-center">
                            <div class="text-3xl mb-2">🔍</div>
                            <p class="font-semibold text-sm">Lector de Barras</p>
                            <p class="text-xs text-gray-500 mt-1">Plug & play — conéctalo por USB y funciona automáticamente en todas las vistas</p>
                            <span class="mt-2 inline-block text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full">✅ Activo siempre</span>
                        </div>
                        <div class="bg-gray-50 dark:bg-slate-700 rounded-xl p-4 text-center">
                            <div class="text-3xl mb-2">🖨️</div>
                            <p class="font-semibold text-sm">Impresora Térmica</p>
                            <p class="text-xs text-gray-500 mt-1">Conectar vía USB/Serial (Chrome/Edge). Papel 80mm compatible con ESC/POS</p>
                            <span class="mt-2 inline-block text-xs ${posWriter?'bg-emerald-100 text-emerald-700':'bg-gray-200 text-gray-600'} px-2 py-1 rounded-full">${posWriter?'✅ Conectada':'⚫ Sin conectar'}</span>
                        </div>
                        <div class="bg-gray-50 dark:bg-slate-700 rounded-xl p-4 text-center">
                            <div class="text-3xl mb-2">💰</div>
                            <p class="font-semibold text-sm">Cajón de Efectivo</p>
                            <p class="text-xs text-gray-500 mt-1">Conecta el cajón al puerto RJ11 de la impresora. Se abre automático al cobrar</p>
                            <span class="mt-2 inline-block text-xs ${posWriter?'bg-emerald-100 text-emerald-700':'bg-gray-200 text-gray-600'} px-2 py-1 rounded-full">${posWriter?'✅ Disponible':'⚫ Requiere impresora'}</span>
                        </div>
                    </div>
                    <button onclick="window.showPOSConfigModal()" class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-xl text-sm font-semibold">
                        ⚙️ Configurar hardware e impresión
                    </button>
                </div>

                <!-- Guía rápida -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-5">
                    <h2 class="font-bold text-gray-800 dark:text-white mb-3">📖 Guía rápida de hardware</h2>
                    <div class="space-y-3 text-sm text-gray-600 dark:text-gray-400">
                        <p><strong>Lector de códigos:</strong> Conecta el escáner USB. Al leer un código en cualquier pantalla, si estás en ventas lo agrega al carrito; en inventario resalta el producto.</p>
                        <p><strong>Impresora térmica:</strong> Requiere Google Chrome o Edge en una computadora. La conexión es por USB (puerto serial/COM). Baudios más comunes: 9600 ó 115200. Papel de 80mm.</p>
                        <p><strong>Cajón de efectivo:</strong> El cajón se conecta con cable RJ11 al puerto "DK" o "Cash Drawer" de la impresora. StockFlow lo abre automáticamente al registrar ventas en efectivo.</p>
                        <p><strong>Múltiples dispositivos:</strong> Activa Firebase y todos tus dispositivos (tablet en caja, celular en almacén) verán el inventario actualizado en segundos.</p>
                    </div>
                </div>
            </div>`;
        };

        // Arrancar Firebase al cargar
        initFirebase();
    </script>
    <!-- Receipt print container (oculto) -->
    <div id="receiptPrint" style="display:none;"></div>
</body>
</html>
