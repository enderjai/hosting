        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }

        function saveData() {

            localStorage.setItem('peopleCount', JSON.stringify(peopleCount));

        function registerMovement(productId, tipo, cantidad, origen, destino, motivo = '') {
            const movement = {
                id: movements.length + 1,
                producto_id: productId,
                usuario_id: currentUser?.id || 1,
                usuario_nombre: currentUser?.nombre || 'Sistema',
                tipo: tipo,
                cantidad: cantidad,
                motivo: motivo,
                origen: origen,
                destino: destino,
                fecha: new Date().toISOString(),
                ip: '127.0.0.1',
                dispositivo: navigator.userAgent
            };
            movements.push(movement);
            saveData();
            return movement;
        }
        
        function generateSKU(categoria, nombre) {
            const prefix = categoria.substring(0, 4).toUpperCase().replace(/[^A-Z]/g, '') || 'PROD';
            const random = Math.floor(Math.random() * 1000);
            return `${prefix}-${random}`;
        }
        
        function calcularElasticidad(precioActual, demandaActual, precioAlternativo, demandaAlternativa) {
            const cambioPrecio = (precioAlternativo - precioActual) / precioActual;
            const cambioDemanda = (demandaAlternativa - demandaActual) / demandaActual;
            if (cambioPrecio === 0) return 1;
            return Math.abs(cambioDemanda / cambioPrecio);
        }
        
        function agregarProveedor(productId, proveedorNombre, precio, fecha) {
            const product = inventory.find(p => p.id === productId);
            if (product) {
                if (!product.proveedores) product.proveedores = [];
                product.proveedores.push({ nombre: proveedorNombre, precio: precio, fecha: fecha });
                const precios = product.proveedores.map(p => p.precio);
                const precioPromedio = precios.reduce((a, b) => a + b, 0) / precios.length;
                product.precio_compra = precioPromedio;
                product.margen = (product.precio_venta || 0) - (product.precio_compra || 0);
                saveData();
                return true;
            }
            return false;
        }
        
        function normalizarTexto(texto) {
            if (!texto) return '';
            return String(texto).toLowerCase().trim().replace(/[áäà]/g, 'a').replace(/[éëè]/g, 'e').replace(/[íïì]/g, 'i').replace(/[óöò]/g, 'o').replace(/[úüù]/g, 'u');
        }
        
        // NUEVA FUNCIÓN: Registrar costo variable
        function registrarCostoVariable(tipo, monto, descripcion = '') {
            const costo = {
                id: variableCosts.length + 1,
                tipo: tipo,
                monto: parseFloat(monto),
                descripcion: descripcion,
                fecha: new Date().toISOString(),
                usuario_id: currentUser?.id || 1,
                usuario_nombre: currentUser?.nombre || 'Sistema'
            };
            variableCosts.push(costo);
            saveData();
            registerMovement(0, 'Costo Variable', monto, 'gasto', 'operacion', `${tipo}: ${descripcion}`);
            return costo;
        }
        
        // NUEVA FUNCIÓN: Obtener total de costos variables por período
        function getTotalVariableCosts(fechaInicio = null, fechaFin = null) {
            let filtered = [...variableCosts];
            if (fechaInicio) {
                filtered = filtered.filter(c => new Date(c.fecha) >= new Date(fechaInicio));
            }
            if (fechaFin) {
                filtered = filtered.filter(c => new Date(c.fecha) <= new Date(fechaFin));
            }
            return filtered.reduce((sum, c) => sum + (c.monto || 0), 0);
        }
        
        // ═══════════════════════════════════════════════
        // SISTEMA DE PRODUCCIÓN FLEXIBLE
        // ═══════════════════════════════════════════════
        function calcularCostoReceta(recipe, cantidad) {
            let costo = 0;
            for (const ing of recipe.ingredientes) {
                if (ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    costo += (p ? p.precio_compra : 0) * ing.cantidad * cantidad;
                } else {
                    costo += (ing.costo_unitario || 0) * ing.cantidad * cantidad;
                }
            }
            costo += (recipe.costo_extra || 0) * cantidad;
            return costo;
        }

        function ejecutarProduccion(recipeId, cantidad, precioVentaOverride, costoExtraVariante, varianteNombre) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) { alert('Receta no encontrada'); return false; }
            if (cantidad <= 0) { alert('La cantidad debe ser mayor a 0'); return false; }

            let faltantes = [];
            for (const ing of recipe.ingredientes) {
                if (ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    if (!p) { faltantes.push(`Producto ID ${ing.producto_id} no existe`); continue; }
                    const stock = (p.stock_almacen || 0) + (p.stock_puntoventa || 0);
                    const necesario = ing.cantidad * cantidad;
                    if (stock < necesario) faltantes.push(`${p.nombre}: necesita ${necesario}, tiene ${stock}`);
                }
            }
            if (faltantes.length > 0) { alert('❌ Stock insuficiente:\n' + faltantes.join('\n')); return false; }

            const costoTotal = calcularCostoReceta(recipe, cantidad) + (costoExtraVariante||0) * cantidad;
            const precioVenta = precioVentaOverride > 0 ? precioVentaOverride : recipe.precio_venta;
            // Nombre del producto de salida incluye variante si la hay
            const nombreSalida = varianteNombre
                ? `${recipe.producto_salida_nombre} (${varianteNombre})`
                : recipe.producto_salida_nombre;

            for (const ing of recipe.ingredientes) {
                if (ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    if (p) {
                        let restante = ing.cantidad * cantidad;
                        const pvDesc = Math.min(p.stock_puntoventa || 0, restante);
                        p.stock_puntoventa = (p.stock_puntoventa || 0) - pvDesc;
                        restante -= pvDesc;
                        if (restante > 0) p.stock_almacen = (p.stock_almacen || 0) - restante;
                        registerMovement(p.id, 'Insumo Producción', ing.cantidad * cantidad, 'inventario', 'produccion',
                            `Insumo para ${cantidad}x "${recipe.nombre}"`);
                    }
                }
            }

            let productoSalida = recipe.producto_salida_id && !varianteNombre
                ? inventory.find(p => p.id === recipe.producto_salida_id)
                : null;
            if (!productoSalida) productoSalida = inventory.find(p => p.nombre === nombreSalida && p.es_producido);

            if (!productoSalida) {
                const newId = Math.max(0, ...inventory.map(p => p.id)) + 1;
                productoSalida = {
                    id: newId,
                    sku: generateSKU('PROD', recipe.nombre + (varianteNombre||'')),
                    nombre: nombreSalida,
                    descripcion: recipe.descripcion || `Producido con receta "${recipe.nombre}"${varianteNombre?' - '+varianteNombre:''}`,
                    categoria: recipe.categoria_salida || 'Productos Producidos',
                    precio_compra: parseFloat((costoTotal / cantidad).toFixed(4)),
                    precio_venta: precioVenta,
                    piezas_por_paquete: 1,
                    stock_almacen: 0,
                    stock_puntoventa: cantidad,
                    codigo_barras: `PROD-${recipeId}-${Date.now()}`,
                    proveedores: [{ nombre: 'Producción Interna', precio: costoTotal / cantidad, fecha: new Date().toISOString().split('T')[0] }],
                    elasticidad: 1.0,
                    margen: precioVenta - costoTotal / cantidad,
                    imagen: recipe.imagen || '🏭',
                    es_producido: true,
                    receta_id: recipeId
                };
                inventory.push(productoSalida);
                if (!varianteNombre) recipe.producto_salida_id = productoSalida.id;
            } else {
                const stockActual = (productoSalida.stock_puntoventa || 0) + (productoSalida.stock_almacen || 0);
                const nuevoPrecioCompra = stockActual > 0
                    ? ((productoSalida.precio_compra * stockActual) + costoTotal) / (stockActual + cantidad)
                    : costoTotal / cantidad;
                productoSalida.precio_compra = parseFloat(nuevoPrecioCompra.toFixed(4));
                productoSalida.precio_venta = precioVenta;
                productoSalida.margen = precioVenta - productoSalida.precio_compra;
                productoSalida.stock_puntoventa = (productoSalida.stock_puntoventa || 0) + cantidad;
            }

            registerMovement(productoSalida.id, 'Producción', cantidad, 'produccion', 'punto_venta',
                `Producidos ${cantidad}x "${recipe.nombre}" | Costo: $${costoTotal.toFixed(2)}`);
            saveData();
            return { costoTotal, precioVenta, costoUnitario: costoTotal / cantidad };
        }

        // EXPORTACIÓN — columnas fijas para re-importación perfecta
        window.exportInventory = function() {
            const exportData = inventory.map(p => ({
                'SKU': p.sku || '',
                'Producto/Nombre': p.nombre || '',
                'Categoría': p.categoria || '',
                'Descripción': p.descripcion || '',
                'Stock_Almacen': p.stock_almacen || 0,
                'Stock_PuntoVenta': p.stock_puntoventa || 0,
                'Precio_Compra': parseFloat((p.precio_compra || 0).toFixed(2)),
                'Precio_Venta': parseFloat((p.precio_venta || 0).toFixed(2)),
                'Código_Barras': p.codigo_barras || '',
                'Proveedor': p.proveedores && p.proveedores[0] ? p.proveedores[0].nombre : '',
                'Elasticidad': parseFloat((p.elasticidad || 1.0).toFixed(2)),
                'Icono/Imagen': p.imagen || '📦'
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            // Ajustar ancho de columnas
            ws['!cols'] = [10,30,20,30,14,16,14,14,18,20,12,12].map(w => ({ wch: w }));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Inventario');
            XLSX.writeFile(wb, `inventario_balneario_${new Date().toISOString().split('T')[0]}.xlsx`);
            alert('✅ Inventario exportado. Puedes editar el archivo y volver a importarlo sin problemas.');
        };

        // Parsear una fila de Excel a objeto producto normalizado
        function parsearFilaExcel(row) {
            let nombre = row['Producto/Nombre'] || row['Producto'] || row['Nombre'] || row['nombre'] || row['NOMBRE'] || '';
            nombre = String(nombre).trim();
            if (!nombre) return null;

            let sku = row['SKU'] || row['sku'] || row['Codigo'] || row['Código'] || '';
            sku = String(sku).trim();

            let categoria = row['Categoría'] || row['Categoria'] || row['CATEGORIA'] || row['categoria'] || 'Otros';
            categoria = String(categoria).trim();

            const leerNum = (campos, def = 0) => {
                for (const c of campos) {
                    if (row[c] !== undefined && row[c] !== '') {
                        const v = parseFloat(String(row[c]).replace(',', '.'));
                        if (!isNaN(v)) return v;
                    }
                }
                return def;
            };
            const leerInt = (campos, def = 0) => {
                for (const c of campos) {
                    if (row[c] !== undefined && row[c] !== '') {
                        const v = parseInt(String(row[c]).replace(',', '.'));
                        if (!isNaN(v)) return v;
                    }
                }
                return def;
            };

            // Stock: primero columnas separadas (formato export), luego columna única
            let stockAlmacen = leerInt(['Stock_Almacen', 'stock_almacen', 'Almacén', 'Almacen'], -1);
            let stockPV = leerInt(['Stock_PuntoVenta', 'stock_puntoventa', 'PuntoVenta', 'Punto_Venta'], -1);
            let stockTotal = leerInt(['Cantidad/Stock', 'Cantidad', 'cantidad', 'Stock', 'stock', 'STOCK'], -1);

            // Si vienen columnas separadas las usamos directamente
            if (stockAlmacen === -1 && stockPV === -1) {
                // Solo tenemos stock total
                const st = stockTotal < 0 ? 0 : stockTotal;
                stockAlmacen = Math.floor(st * 0.7);
                stockPV = st - stockAlmacen;
            } else {
                if (stockAlmacen < 0) stockAlmacen = 0;
                if (stockPV < 0) stockPV = 0;
            }

            let precioCompra = leerNum(['Precio_Compra','precio_compra','Compra','COMPRA']);
            let precioVenta = leerNum(['Precio_Venta','precio_venta','Venta','VENTA']);
            if (precioVenta <= 0 && precioCompra > 0) precioVenta = parseFloat((precioCompra * 1.5).toFixed(2));

            let codigo = row['Código_Barras'] || row['Codigo_Barras'] || row['codigo_barras'] || row['Codigo'] || '';
            codigo = String(codigo).trim() || `COD-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;

            let proveedor = row['Proveedor'] || row['proveedor'] || 'Importado';
            proveedor = String(proveedor).trim();

            let elasticidad = leerNum(['Elasticidad','elasticidad'], 1.0);
            if (elasticidad <= 0) elasticidad = 1.0;

            let imagen = row['Icono/Imagen'] || row['Icono'] || row['imagen'] || '📦';
            imagen = String(imagen).trim() || '📦';

            let descripcion = row['Descripción'] || row['Descripcion'] || row['descripcion'] || '';
            descripcion = String(descripcion).trim();

            return { nombre, sku, categoria, stockAlmacen, stockPV, precioCompra, precioVenta, codigo, proveedor, elasticidad, imagen, descripcion };
        }

        // Ejecutar la importación con el modo elegido
        function ejecutarImportacion(jsonData, modo) {
            let agregados = 0, actualizados = 0, errores = [];

            for (const row of jsonData) {
                try {
                    const p = parsearFilaExcel(row);
                    if (!p) { errores.push('Fila sin nombre: ' + JSON.stringify(row).slice(0,60)); continue; }

                    // Buscar existente por SKU primero (más preciso), luego por nombre normalizado
                    let existingIdx = -1;
                    if (p.sku) existingIdx = inventory.findIndex(x => x.sku && x.sku.trim() === p.sku);
                    if (existingIdx === -1) existingIdx = inventory.findIndex(x => normalizarTexto(x.nombre) === normalizarTexto(p.nombre));

                    if (existingIdx !== -1) {
                        const ex = inventory[existingIdx];
                        const stockPrevio = (ex.stock_almacen || 0) + (ex.stock_puntoventa || 0);
                        const nuevoTotal = p.stockAlmacen + p.stockPV;

                        if (modo === 'reemplazar') {
                            ex.stock_almacen = p.stockAlmacen;
                            ex.stock_puntoventa = p.stockPV;
                        } else { // sumar
                            ex.stock_almacen = (ex.stock_almacen || 0) + p.stockAlmacen;
                            ex.stock_puntoventa = (ex.stock_puntoventa || 0) + p.stockPV;
                        }
                        if (p.precioCompra > 0) ex.precio_compra = p.precioCompra;
                        if (p.precioVenta > 0) ex.precio_venta = p.precioVenta;
                        ex.margen = (ex.precio_venta || 0) - (ex.precio_compra || 0);
                        ex.categoria = p.categoria;
                        ex.codigo_barras = p.codigo;
                        ex.elasticidad = p.elasticidad;
                        ex.imagen = p.imagen;
                        if (p.descripcion) ex.descripcion = p.descripcion;
                        if (!ex.proveedores) ex.proveedores = [];
                        // Evitar proveedor duplicado
                        if (!ex.proveedores.find(pv => pv.nombre === p.proveedor)) {
                            ex.proveedores.push({ nombre: p.proveedor, precio: p.precioCompra, fecha: new Date().toISOString().split('T')[0] });
                        }
                        registerMovement(ex.id, 'Importación', nuevoTotal, 'importacion', 'almacen',
                            `Modo: ${modo}. Stock anterior: ${stockPrevio} → Nuevo: ${(ex.stock_almacen||0)+(ex.stock_puntoventa||0)}`);
                        actualizados++;
                    } else {
                        const newId = Math.max(0, ...inventory.map(x => x.id)) + 1;
                        inventory.push({
                            id: newId,
                            sku: p.sku || generateSKU(p.categoria, p.nombre),
                            nombre: p.nombre,
                            descripcion: p.descripcion,
                            categoria: p.categoria,
                            precio_compra: p.precioCompra,
                            precio_venta: p.precioVenta,
                            piezas_por_paquete: 1,
                            stock_almacen: p.stockAlmacen,
                            stock_puntoventa: p.stockPV,
                            codigo_barras: p.codigo,
                            proveedores: [{ nombre: p.proveedor, precio: p.precioCompra, fecha: new Date().toISOString().split('T')[0] }],
                            elasticidad: p.elasticidad,
                            margen: p.precioVenta - p.precioCompra,
                            imagen: p.imagen
                        });
                        agregados++;
                    }
                } catch(err) {
                    errores.push(err.message);
                }
            }
            saveData();
            return { agregados, actualizados, errores };
        }

            // Empleados no tienen acceso al dashboard financiero

                return;
            }

            const totalInventory = inventory.reduce((sum, p) => sum + (p.stock_almacen || 0) + (p.stock_puntoventa || 0), 0);
            const dailySales = sales.filter(s => new Date(s.fecha).toDateString() === new Date().toDateString()).reduce((sum, s) => sum + (s.total || 0), 0);
            const dailyProfit = sales.filter(s => new Date(s.fecha).toDateString() === new Date().toDateString()).reduce((sum, s) => sum + (s.ganancia || 0), 0);
            const lowStock = inventory.filter(p => ((p.stock_almacen || 0) + (p.stock_puntoventa || 0)) < 10);

        // NUEVA VISTA: Costos Variables
        // ─── helpers de costos ──────────────────────────────
        const FREQ_LABELS = { diario:'Diario', semanal:'Semanal', quincenal:'Quincenal', mensual:'Mensual', bimestral:'Bimestral', trimestral:'Trimestral', anual:'Anual', unico:'Único/Eventual' };
        const TIPO_COLORS = { fijo:'blue', empleado:'purple', recurrente:'emerald', ocasional:'orange', mantenimiento:'red', compra:'amber' };
        const TIPO_EMOJIS = { fijo:'🏦', empleado:'👷', recurrente:'🔁', ocasional:'⚡', mantenimiento:'🔧', compra:'🛒' };

        function costoMensualEquivalente(c) {
            const m = c.monto || 0;
            switch(c.frecuencia) {
                case 'diario': return m * 30;
                case 'semanal': return m * 4.33;
                case 'quincenal': return m * 2;
                case 'mensual': return m;
                case 'bimestral': return m / 2;
                case 'trimestral': return m / 3;
                case 'anual': return m / 12;
                default: return 0; // único no se proyecta mensual
            }
        }

        function empleadoCostoMensual(e) {
            switch(e.tipo_pago) {
                case 'hora': return (e.monto||0) * (e.horas_semana||40) * 4.33;
                case 'semana': return (e.monto||0) * 4.33;
                case 'quincena': return (e.monto||0) * 2;
                case 'mes': return e.monto||0;
                default: return e.monto||0;
            }
        }

        function calcularResumenCostos() {
            const costosActivos = costos.filter(c => c.activo !== false);
            const mensual = costosActivos.reduce((s,c) => s + costoMensualEquivalente(c), 0);
            const empleadosMensual = empleados.filter(e => e.activo !== false).reduce((s,e) => s + empleadoCostoMensual(e), 0);
            const gastosUnicosEstesMes = variableCosts.filter(c => {
                const d = new Date(c.fecha);
                const hoy = new Date();
                return d.getMonth() === hoy.getMonth() && d.getFullYear() === hoy.getFullYear();
            }).reduce((s,c) => s + (c.monto||0), 0);
            return { mensual: mensual + empleadosMensual + gastosUnicosEstesMes, mensualEstructural: mensual + empleadosMensual, gastosVariables: gastosUnicosEstesMes, empleadosMensual };
        }

        window.responderSolicitud = function(id, decision) {
            const s = solicitudesInv.find(x => x.id === id);
            if (!s) return;
            let nota = '';
            if (decision === 'rechazada') nota = prompt('Motivo del rechazo (opcional):') || '';
            if (decision === 'aprobada') {
                // Transferir stock solicitado de almacén a PV
                const p = inventory.find(x => x.id === s.producto_id);
                if (p) {
                    const qty = Math.min(s.cantidad, p.stock_almacen || 0);
                    if (qty <= 0) { alert('No hay stock suficiente en almacén para transferir.'); decision = 'rechazada'; nota = 'Sin stock en almacén.'; }

                        p.stock_puntoventa = (p.stock_puntoventa || 0) + qty;

        window.producirAhora = function(recipeId) {
            const qty = parseInt(document.getElementById('qty_' + recipeId)?.value) || 0;
            if (qty <= 0) { alert('Ingresa una cantidad válida'); return; }
            const recipe = recipes.find(r => r.id === recipeId);

            // Manejo de variantes
            const varSel = document.getElementById('var_' + recipeId);
            let costoExtraVar = 0;
            let varNombre = '';
            if (varSel) {
                costoExtraVar = parseFloat(varSel.value) || 0;
                varNombre = varSel.options[varSel.selectedIndex]?.dataset?.nombre || '';
            }

            const pvEl = document.getElementById('pv_' + recipeId);
            const pv = pvEl ? (parseFloat(pvEl.value) || 0) : 0;

            // Nombre del producto de salida incluye variante
            const nombreSalidaOriginal = recipe?.producto_salida_nombre;
            if (varNombre && recipe) {
                recipe._varianteActual = varNombre;
                recipe._costoExtraVarActual = costoExtraVar;
            }

            const result = ejecutarProduccion(recipeId, qty, pv, costoExtraVar, varNombre);
            if (recipe) { delete recipe._varianteActual; delete recipe._costoExtraVarActual; }
            if (result) {
                alert(`✅ Producción completada!\n\n📦 Cantidad: ${qty}${varNombre ? ' · ' + varNombre : ''}\n💰 Costo total: $${result.costoTotal.toFixed(2)}\n💵 Precio venta: $${result.precioVenta.toFixed(2)}\n📈 Ganancia estimada: $${(result.precioVenta * qty - result.costoTotal).toFixed(2)}`);
                renderTransformationsView();
            }
        };

        window.saveRecipe = function(editId) {
            const nombre = document.getElementById('rNombre')?.value?.trim();
            const salidaNombre = document.getElementById('rSalidaNombre')?.value?.trim();
            const precioVenta = parseFloat(document.getElementById('rPrecioVenta')?.value) || 0;
            const costoExtra = parseFloat(document.getElementById('rCostoExtra')?.value) || 0;
            const categoria = document.getElementById('rCategoria')?.value || 'Productos Producidos';
            const imagen = document.getElementById('rIcono')?.value?.trim() || '🏭';
            const descripcion = document.getElementById('rDesc')?.value?.trim() || '';
            if (!nombre || !salidaNombre) { alert('El nombre de la receta y el producto de salida son obligatorios'); return; }

            const ingredientes = [];
            const rows = document.querySelectorAll('#ingredientesList [data-idx]');
            for (const row of rows) {
                const qty = parseFloat(row.querySelector('.ing-qty')?.value) || 0;
                if (qty <= 0) continue;

                const catSel = row.querySelector('.ing-cat');
                const prodSel = row.querySelector('.ing-prod');
                const nameEl = row.querySelector('.ing-name');

                if (catSel) {
                    // Ingrediente por categoría
                    const cat = catSel.value;
                    const label = row.querySelector('.ing-label')?.value?.trim() || cat;
                    if (cat) ingredientes.push({ tipo: 'categoria', categoria: cat, cantidad: qty, label });
                } else if (prodSel) {
                    // Ingrediente fijo del inventario
                    const prodId = parseInt(prodSel.value);
                    if (prodId) ingredientes.push({ tipo: 'fijo', producto_id: prodId, cantidad: qty });
                } else if (nameEl) {
                    // Insumo manual
                    const ingName = nameEl.value?.trim();
                    const costEl = row.querySelector('.ing-cost');
                    if (ingName) ingredientes.push({ tipo: 'manual', producto_id: null, nombre_insumo: ingName, cantidad: qty, costo_unitario: parseFloat(costEl?.value)||0, es_insumo_general: true });
                }
            }

            // Variantes de nombre
            const variante_label = document.getElementById('rVarLabel')?.value?.trim() || '';
            const variantes = [];
            document.querySelectorAll('#variantesList [data-vari]').forEach(row => {
                const nombre_v = row.querySelector('.var-nombre')?.value?.trim();
                const costo_extra = parseFloat(row.querySelector('.var-costo')?.value) || 0;
                if (nombre_v) variantes.push({ nombre: nombre_v, costo_extra });
            });

            if (editId) {
                const idx = recipes.findIndex(r => r.id === editId);
                if (idx !== -1) {
                    if (recipes[idx].producto_salida_nombre !== salidaNombre) recipes[idx].producto_salida_id = null;
                    Object.assign(recipes[idx], { nombre, producto_salida_nombre: salidaNombre, precio_venta: precioVenta, costo_extra: costoExtra, categoria_salida: categoria, imagen, descripcion, ingredientes, activo: true, variantes, variante_label });
                }
            } else {
                const newId = Math.max(0, ...recipes.map(r => r.id)) + 1;
                recipes.push({ id: newId, nombre, producto_salida_nombre: salidaNombre, producto_salida_id: null, precio_venta: precioVenta, costo_extra: costoExtra, categoria_salida: categoria, imagen, descripcion, ingredientes, activo: true, variantes, variante_label });
            }
            saveData();
            document.getElementById('recipeModal')?.remove();
            renderTransformationsView();
        };

        window._actualizarCostoProd = function() {
            const qty = parseInt(document.getElementById('prodQty')?.value) || 1;
            const modalEl = document.getElementById('prodModal');
            if (!modalEl) return;

            // Recoger ingredientes por categoría seleccionados
            const selMap = {};
            modalEl.querySelectorAll('.cat-ing-radio:checked').forEach(r => {
                selMap[r.dataset.catidx] = parseInt(r.value);
            });

            // Calcular costo incluyendo los productos por categoría seleccionados
            const recipeId = parseInt(modalEl.querySelector('[onclick*="_confirmarProduccion"]')?.getAttribute('onclick')?.match(/\d+/)?.[0]);
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;

            let costoTotal = (recipe.costo_extra||0);
            const desglose = [];

            for (const [i, ing] of (recipe.ingredientes||[]).entries()) {
                if (ing.tipo === 'categoria') {
                    const pid = selMap[Object.keys(selMap).find(k => {
                        // match by position among categoria ingredients
                        const catIngs = recipe.ingredientes.filter(x=>x.tipo==='categoria');
                        const catIdx = catIngs.indexOf(ing);
                        return parseInt(k) === catIdx;
                    })];
                    if (pid) {
                        const p = inventory.find(x => x.id === pid);
                        if (p) {
                            costoTotal += (p.precio_compra||0) * ing.cantidad;
                            desglose.push(`${p.imagen||'📦'} ${p.nombre} × ${ing.cantidad}: $${((p.precio_compra||0)*ing.cantidad).toFixed(2)}`);
                        }
                    }
                } else if (ing.tipo === 'fijo' || ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    if (p) {
                        costoTotal += (p.precio_compra||0) * ing.cantidad;
                        desglose.push(`${p.imagen||'📦'} ${p.nombre} × ${ing.cantidad}: $${((p.precio_compra||0)*ing.cantidad).toFixed(2)}`);
                    }
                } else if (ing.tipo === 'manual') {
                    costoTotal += (ing.costo_unitario||0) * ing.cantidad;
                    desglose.push(`⚗️ ${ing.nombre_insumo} × ${ing.cantidad}: $${((ing.costo_unitario||0)*ing.cantidad).toFixed(2)}`);
                }
            }

            const varIdx = parseInt(modalEl.querySelector('input[name="prodVariante"]:checked')?.value);
            const varExtra = !isNaN(varIdx) ? (recipe.variantes?.[varIdx]?.costo_extra||0) : 0;
            costoTotal += varExtra;

            const pvInput = parseFloat(document.getElementById('prodPV')?.value) || 0;
            const pv = pvInput > 0 ? pvInput : recipe.precio_venta;
            const totalQty = costoTotal * qty;
            const ganancia = (pv - costoTotal) * qty;

            const resEl = document.getElementById('prodCostoResumen');
            if (resEl) resEl.innerHTML = `
                ${desglose.map(d=>`<div class="flex justify-between text-xs text-gray-600 dark:text-gray-400"><span>${d}</span></div>`).join('')}
                ${varExtra > 0 ? `<div class="flex justify-between text-xs text-indigo-600"><span>+ Extra variante</span><span>$${varExtra.toFixed(2)}</span></div>` : ''}
                ${recipe.costo_extra > 0 ? `<div class="flex justify-between text-xs text-orange-600"><span>+ Costo fijo receta</span><span>$${recipe.costo_extra.toFixed(2)}</span></div>` : ''}
                <div class="border-t border-gray-200 dark:border-slate-600 mt-2 pt-2 space-y-1">
                    <div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">Costo unitario:</span><span class="font-semibold text-orange-600">$${costoTotal.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">Costo × ${qty}:</span><span class="font-semibold text-red-600">$${totalQty.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">Precio venta:</span><span class="font-semibold text-blue-600">$${pv.toFixed(2)}/u</span></div>
                    <div class="flex justify-between font-bold text-base ${ganancia>=0?'text-emerald-600':'text-red-600'}"><span>Ganancia estimada × ${qty}:</span><span>${ganancia>=0?'+':''}$${ganancia.toFixed(2)}</span></div>
                </div>`;
        };

        window._confirmarProduccion = function(recipeId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;
            const qty = parseInt(document.getElementById('prodQty')?.value) || 0;
            const pv = parseFloat(document.getElementById('prodPV')?.value) || 0;
            if (qty <= 0) { alert('Ingresa una cantidad válida'); return; }

            const modalEl = document.getElementById('prodModal');

            // Recoger selecciones por categoría (índice → producto_id)
            const selectedProds = {};
            const catIngs = (recipe.ingredientes||[]).filter(i=>i.tipo==='categoria');
            catIngs.forEach((ing, catIdx) => {
                const sel = modalEl?.querySelector(`input[name="catIng_${catIdx}"]:checked`);
                if (sel) selectedProds[catIdx] = parseInt(sel.value);
            });

            // Validar que todas las categorías tengan selección
            for (let i = 0; i < catIngs.length; i++) {

            const varIdx = parseInt(modalEl?.querySelector('input[name="prodVariante"]:checked')?.value);
            const varNombre = !isNaN(varIdx) ? recipe.variantes?.[varIdx]?.nombre : null;
            const varCostoExtra = !isNaN(varIdx) ? (recipe.variantes?.[varIdx]?.costo_extra||0) : 0;

            const result = ejecutarProduccion(recipeId, qty, pv, varCostoExtra, varNombre, selectedProds);

        let invSort = 'nombre_az';

        function getInvRows(search, cat, sort) {
            let list = inventory.map(p => ({...p}));
            if (search) list = list.filter(p => normalizarTexto(p.nombre||'').includes(normalizarTexto(search)) || (p.sku||'').toLowerCase().includes(search.toLowerCase()));
            if (cat && cat !== 'all') list = list.filter(p => p.categoria === cat);
            if (sort === 'nombre_az') list.sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''));
            else if (sort === 'nombre_za') list.sort((a,b) => (b.nombre||'').localeCompare(a.nombre||''));
            else if (sort === 'stock_h_desc') list.sort((a,b) => ((b.stock_almacen||0)+(b.stock_puntoventa||0))-((a.stock_almacen||0)+(a.stock_puntoventa||0)));
            else if (sort === 'stock_l_asc') list.sort((a,b) => ((a.stock_almacen||0)+(a.stock_puntoventa||0))-((b.stock_almacen||0)+(b.stock_puntoventa||0)));
            else if (sort === 'precio_v_desc') list.sort((a,b) => (b.precio_venta||0)-(a.precio_venta||0));
            else if (sort === 'precio_v_asc') list.sort((a,b) => (a.precio_venta||0)-(b.precio_venta||0));
            return list;
        }

        function stockBadge(p) {
            const t = (p.stock_almacen||0)+(p.stock_puntoventa||0);
            if (t === 0) return `<span class="px-2 py-0.5 text-xs rounded-full bg-red-100 text-red-700 font-semibold">Sin stock</span>`;
            if (t < 5) return `<span class="px-2 py-0.5 text-xs rounded-full bg-orange-100 text-orange-700 font-semibold">⚠️ Bajo: ${t}</span>`;
            if (t < 15) return `<span class="px-2 py-0.5 text-xs rounded-full bg-yellow-100 text-yellow-700 font-semibold">~Bajo: ${t}</span>`;
            return `<span class="px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 font-semibold">✓ ${t}</span>`;
        }

        window.calcularPrecioRecomendado = function() {
            const costo = parseFloat(document.getElementById('calcCosto')?.value);
            const margen = parseFloat(document.getElementById('calcMargen')?.value);
            const elasticidad = parseFloat(document.getElementById('calcElasticidad')?.value);
            
            if (isNaN(costo) || isNaN(margen)) {
                alert('Ingrese valores válidos');
                return;
            }
            
            let precioBase = costo * (1 + margen / 100);
            let precioRecomendado = precioBase;
            let recomendacion = '';
            
            if (!isNaN(elasticidad)) {
                if (elasticidad < 1) {
                    precioRecomendado = precioBase * 1.2;
                    recomendacion = 'Producto inelástico. Puedes aumentar el precio hasta un 20% más sin afectar significativamente la demanda.';
                } else if (elasticidad > 1.5) {
                    precioRecomendado = precioBase * 0.9;
                    recomendacion = 'Producto muy elástico. Recomendamos un precio más competitivo para maximizar ventas.';
                } else {
                    recomendacion = 'Elasticidad normal. El precio calculado es adecuado para el mercado.';
                }
            } else {
                recomendacion = 'Sin datos de elasticidad. Usando margen estándar.';
            }
            
            const precioSpan = document.getElementById('precioRecomendado');
            const recomendacionDiv = document.getElementById('recomendacionTexto');
            const resultadoDiv = document.getElementById('resultadoPrecio');
            
            if (precioSpan) precioSpan.innerHTML = `$${precioRecomendado.toFixed(2)}`;
            if (recomendacionDiv) recomendacionDiv.innerHTML = recomendacion;
            if (resultadoDiv) resultadoDiv.classList.remove('hidden');
        };
        
        window.calcularElasticidadDemo = function() {
            const precioActual = parseFloat(document.getElementById('elasticPrecioActual')?.value);
            const demandaActual = parseFloat(document.getElementById('elasticDemandaActual')?.value);
            const precioAlternativo = parseFloat(document.getElementById('elasticPrecioAlternativo')?.value);
            const demandaAlternativa = parseFloat(document.getElementById('elasticDemandaAlternativa')?.value);
            
            if (isNaN(precioActual) || isNaN(demandaActual) || isNaN(precioAlternativo) || isNaN(demandaAlternativa)) {
                alert('Complete todos los campos');
                return;
            }
            
            const elasticidad = calcularElasticidad(precioActual, demandaActual, precioAlternativo, demandaAlternativa);
            let interpretacion = '';
            
            if (elasticidad < 0.8) {
                interpretacion = 'Producto inelástico. Los cambios de precio tienen poco efecto en la demanda. Puedes aumentar precios.';
            } else if (elasticidad > 1.2) {
                interpretacion = 'Producto elástico. La demanda es sensible a cambios de precio. Considera precios competitivos.';
            } else {
                interpretacion = 'Elasticidad unitaria. Cambios de precio tienen efecto proporcional en la demanda.';
            }
            
            const elasticidadSpan = document.getElementById('elasticidadValor');
            const interpretacionDiv = document.getElementById('elasticidadInterpretacion');
            const resultadoDiv = document.getElementById('resultadoElasticidad');
            
            if (elasticidadSpan) elasticidadSpan.innerHTML = elasticidad.toFixed(2);
            if (interpretacionDiv) interpretacionDiv.innerHTML = interpretacion;
            if (resultadoDiv) resultadoDiv.classList.remove('hidden');
        };

        window.executeTransfer = function(productId) {
            const product = inventory.find(p => p.id === productId);
            const direction = document.getElementById('transferDirection')?.value;
            const quantity = parseInt(document.getElementById('transferQuantity')?.value);
            const reason = document.getElementById('transferReason')?.value || 'Transferencia interna';
            
            if (!product) return;
            if (!quantity || quantity <= 0) {
                alert('Ingrese una cantidad válida');
                return;
            }
            
            if (direction === 'almacen_to_pv') {
                if ((product.stock_almacen || 0) < quantity) {
                    alert(`No hay suficiente stock en Almacén. Disponible: ${product.stock_almacen || 0}`);
                    return;
                }
                product.stock_almacen = (product.stock_almacen || 0) - quantity;
                product.stock_puntoventa = (product.stock_puntoventa || 0) + quantity;
                registerMovement(productId, 'Transferencia', quantity, 'almacen', 'punto_venta', reason);
            } else {
                if ((product.stock_puntoventa || 0) < quantity) {
                    alert(`No hay suficiente stock en Punto de Venta. Disponible: ${product.stock_puntoventa || 0}`);
                    return;
                }
                product.stock_puntoventa = (product.stock_puntoventa || 0) - quantity;
                product.stock_almacen = (product.stock_almacen || 0) + quantity;
                registerMovement(productId, 'Transferencia', quantity, 'punto_venta', 'almacen', reason);
            }
            
            saveData();
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
            renderInventoryView();
            alert(`Transferencia completada: ${quantity} unidades`);
        };

        // ─── helpers de ventas ──────────────────────────────
        // Cuenta cuántas veces se ha vendido cada producto (para ordenar por popularidad)
        function getSalesRanking() {
            const rank = {};
            for (const s of sales) {
                for (const p of (s.productos || [])) {
                    rank[p.id] = (rank[p.id] || 0) + (p.cantidad || 1);
                }
            }
            return rank;
        }

        // Filtra y ordena el catálogo para el POS
        function getPOSProducts(searchTerm, catFilter) {
            const rank = getSalesRanking();
            let list = inventory.filter(p => (p.stock_puntoventa || 0) > 0);
            if (catFilter && catFilter !== 'all') list = list.filter(p => p.categoria === catFilter);
            if (searchTerm) {
                const t = normalizarTexto(searchTerm);
                list = list.filter(p => normalizarTexto(p.nombre || '').includes(t) || (p.sku||'').toLowerCase().includes(searchTerm.toLowerCase()) || (p.codigo_barras||'').includes(searchTerm));
            }
            list.sort((a, b) => (rank[b.id] || 0) - (rank[a.id] || 0));
            return list;
        }

                <p class="text-xs font-semibold text-gray-800 dark:text-white leading-tight mb-1 line-clamp-2" style="min-height:2em">${p.nombre||''}</p>
                <p class="text-sm font-bold text-emerald-600">$${(p.precio_venta||0).toFixed(2)}</p>
                <p class="text-xs text-gray-400 mt-0.5">Stock: ${p.stock_puntoventa||0}</p>
                ${ventas > 0 ? `<span class="mt-1 text-xs bg-amber-100 text-amber-700 px-2 rounded-full">🔥 ×${ventas}</span>` : ''}
                ${inCart ? `<span class="mt-1 text-xs bg-emerald-100 text-emerald-700 px-2 rounded-full font-bold">en carrito: ${inCart.cantidad}</span>` : ''}
            </button>`;
        }

        function renderCartHTML(isMobile) {
            const items = window.cart || [];
            const total = items.reduce((s, i) => s + (i.precio_venta||0) * (i.cantidad||0), 0);
            const ganancia = items.reduce((s, i) => s + (i.margen||0) * (i.cantidad||0), 0);
            const metodo = window.posPayMethod || 'efectivo';
            const pid = isMobile ? 'M' : 'D';   // sufijo para IDs únicos por panel
            const BILLETES = [20,50,100,200,500,1000];

            return `
            <div class="p-4 border-b border-gray-100 dark:border-slate-700 flex items-center justify-between flex-shrink-0">
                <h3 class="font-bold text-gray-800 dark:text-white">🛒 Carrito <span class="text-emerald-600">(${items.length})</span></h3>
                ${isMobile ? `<button onclick="window.toggleCartPanel()" class="text-gray-400 hover:text-gray-600 p-2"><i class="fas fa-times text-lg"></i></button>` : ''}
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-2 min-h-0">
                ${items.length === 0
                    ? `<div class="text-center py-8 text-gray-400"><div class="text-4xl mb-2">🛒</div><p class="text-sm">Carrito vacío</p></div>`
                    : items.map((item, idx) => `
                        <div class="flex items-center gap-2 p-2 rounded-xl bg-gray-50 dark:bg-slate-700">
                            <span class="text-xl flex-shrink-0">${item.imagen||'📦'}</span>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-semibold text-gray-800 dark:text-white truncate">${item.nombre||''}</p>
                                <p class="text-xs text-emerald-600">$${(item.precio_venta||0).toFixed(2)} c/u</p>
                            </div>
                            <div class="flex items-center gap-1 flex-shrink-0">
                                <button class="qty-btn bg-gray-200 dark:bg-slate-600 rounded-lg text-sm font-bold hover:bg-red-100 dark:hover:bg-red-900/30"
                                    onclick="window.cartQty(${idx},-1)">−</button>
                                <input type="number" value="${item.cantidad||1}" min="1"
                                    class="w-10 text-center text-sm font-bold border rounded-lg dark:bg-slate-600 dark:text-white py-1 outline-none"
                                    onchange="window.cartSetQty(${idx},this.value)" onclick="this.select()">
                                <button class="qty-btn bg-gray-200 dark:bg-slate-600 rounded-lg text-sm font-bold hover:bg-emerald-100 dark:hover:bg-emerald-900/30"
                                    onclick="window.cartQty(${idx},1)">+</button>
                                <button class="qty-btn text-red-400 hover:text-red-600 ml-1" onclick="window.removeFromCart(${idx})">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>
                        </div>`).join('')}
            </div>

            <div class="p-4 border-t border-gray-100 dark:border-slate-700 flex-shrink-0 space-y-3">
                <!-- Ganancia y total -->
                <div class="flex justify-between text-sm text-gray-500">
                    <span>Ganancia estimada</span>
                    <span class="text-emerald-600 font-semibold">$${ganancia.toFixed(2)}</span>
                </div>
                <div class="flex justify-between">
                    <span class="font-bold text-gray-800 dark:text-white text-lg">TOTAL</span>
                    <span class="font-bold text-2xl text-emerald-600" id="cartTotal${pid}">$${total.toFixed(2)}</span>
                </div>

                <!-- Método de pago — solo efectivo y transferencia -->
                <div class="grid grid-cols-2 gap-2">
                    ${['efectivo','transferencia'].map(m => `
                        <button class="pay-btn py-3 rounded-xl text-sm font-semibold border-2 transition-all
                            ${metodo === m
                                ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400'
                                : 'border-gray-200 dark:border-slate-600 text-gray-600 dark:text-gray-400 hover:border-gray-300'}"
                            onclick="window.setPosPayMethod('${m}'); window.recalcChange${pid}();">
                            ${m === 'efectivo' ? '💵 Efectivo' : '📲 Transferencia'}
                        </button>`).join('')}
                </div>

                <!-- Calculadora de cambio (solo efectivo) -->
                <div id="cambioSection${pid}" class="${metodo==='efectivo'?'':'hidden'} space-y-2">
                    <p class="text-xs font-semibold text-gray-600 dark:text-gray-400">💵 ¿Con cuánto paga?</p>
                    <div class="grid grid-cols-3 gap-1.5">
                        ${BILLETES.map(b => `
                        <button onclick="document.getElementById('billete${pid}').value=${b}; window.recalcChange${pid}();"
                            class="py-1.5 bg-gray-100 dark:bg-slate-700 hover:bg-emerald-100 dark:hover:bg-emerald-900/30 rounded-xl text-xs font-bold active:scale-95 transition-all">
                            $${b}
                        </button>`).join('')}
                    </div>
                    <input type="number" id="billete${pid}" placeholder="O escribe la cantidad exacta..."
                        class="w-full px-3 py-2 border-2 border-gray-200 dark:border-slate-600 rounded-xl dark:bg-slate-700 text-sm focus:border-emerald-400 outline-none"
                        oninput="window.recalcChange${pid}()" step="0.50">
                    <div id="cambioResult${pid}" class="hidden rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-500 mb-0.5">Cambio a dar</p>
                        <p id="cambioValor${pid}" class="text-3xl font-black text-emerald-600">$0.00</p>
                    </div>
                </div>

                <!-- Aviso transferencia -->
                <div id="transSection${pid}" class="${metodo==='transferencia'?'':'hidden'} bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-700 rounded-xl p-3 text-sm text-blue-800 dark:text-blue-300">
                    <p class="font-semibold mb-1">📲 Pago por transferencia</p>
                    <p class="text-xs">Se solicitará confirmación de recepción antes de registrar la venta.</p>
                </div>

                <!-- Botón cobrar -->
                <button onclick="window.processSale()" ${items.length===0?'disabled':''}
                    class="w-full py-4 rounded-2xl font-bold text-lg transition-all
                        ${items.length > 0
                            ? 'bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white shadow-lg shadow-emerald-200 dark:shadow-none'
                            : 'bg-gray-200 dark:bg-slate-700 text-gray-400 cursor-not-allowed'}">
                    <i class="fas fa-check-circle mr-2"></i>COBRAR $${total.toFixed(2)}
                </button>
                ${items.length > 0 ? `<button onclick="window.clearCart()" class="w-full text-xs text-red-400 hover:text-red-600 py-1">🗑️ Vaciar carrito</button>` : ''}
            </div>`;
        }

        // Funciones de cálculo de cambio — una por panel (D = desktop, M = mobile)
        function _makeRecalc(pid) {
            return function() {
                const metodo = window.posPayMethod || 'efectivo';
                const cs = document.getElementById('cambioSection' + pid);
                const ts = document.getElementById('transSection' + pid);
                if (cs) cs.classList.toggle('hidden', metodo !== 'efectivo');
                if (ts) ts.classList.toggle('hidden', metodo !== 'transferencia');
                if (metodo !== 'efectivo') return;
                const total = (window.cart||[]).reduce((s,i)=>s+(i.precio_venta||0)*(i.cantidad||0), 0);
                const billete = parseFloat(document.getElementById('billete' + pid)?.value) || 0;
                const res = document.getElementById('cambioResult' + pid);
                const val = document.getElementById('cambioValor' + pid);
                if (!res || !val || billete <= 0) { res?.classList.add('hidden'); return; }
                const cambio = billete - total;
                res.classList.remove('hidden');
                if (cambio < 0) {
                    res.className = 'rounded-xl p-3 text-center bg-red-50 dark:bg-red-900/20 border border-red-200';
                    val.className = 'text-3xl font-black text-red-600';
                    val.textContent = `Faltan $${Math.abs(cambio).toFixed(2)}`;
                } else {
                    res.className = 'rounded-xl p-3 text-center bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200';
                    val.className = 'text-3xl font-black text-emerald-600';
                    val.textContent = cambio === 0 ? '✅ Pago exacto' : `$${cambio.toFixed(2)}`;
                }
                window._lastBillete = billete;
                window._lastCambio = Math.max(0, cambio);
            };
        }
        window.recalcChangeD = _makeRecalc('D');
        window.recalcChangeM = _makeRecalc('M');

        function refreshCartBadge() {
            const items = window.cart || [];
            const total = items.reduce((s, i) => s + (i.precio_venta||0) * (i.cantidad||0), 0);
            const count = items.reduce((s, i) => s + (i.cantidad||0), 0);
            const badge = document.getElementById('cartBadgeCount');
            const totEl = document.getElementById('cartBadgeTotal');
            if (badge) badge.textContent = count;
            if (totEl) totEl.textContent = `$${total.toFixed(2)}`;
        }

        function refreshCartPanels() {
            const html = renderCartHTML(false);
            const htmlM = renderCartHTML(true);
            const d = document.getElementById('cartPanel');
            const o = document.getElementById('cartOverlay')?.querySelector('.relative');
            if (d) d.innerHTML = html;
            if (o) o.innerHTML = htmlM;
            refreshCartBadge();
            // Resaltar cards en grid
            document.querySelectorAll('.pos-card').forEach(btn => {
                const pid = parseInt(btn.getAttribute('onclick')?.match(/\d+/)?.[0]);
                const inCart = (window.cart||[]).find(c => c.id === pid);
                btn.classList.toggle('border-emerald-400', !!inCart);
                btn.classList.toggle('bg-emerald-50', !!inCart);
            });
        }

        function attachPOSEvents() {
            const inp = document.getElementById('posSearch');
            const drop = document.getElementById('posSearchDropdown');
            if (!inp || !drop) return;

            inp.addEventListener('input', () => {
                const v = inp.value.trim();
                if (!v) { drop.classList.add('hidden'); return; }
                const results = getPOSProducts(v, 'all').slice(0, 8);
                if (results.length === 0) { drop.classList.add('hidden'); return; }
                drop.innerHTML = results.map(p => `
                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-slate-700 text-left transition-all"
                        onclick="window.posAddProduct(${p.id}); document.getElementById('posSearch').value=''; document.getElementById('posSearchDropdown').classList.add('hidden');">
                        <span class="text-2xl">${p.imagen||'📦'}</span>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-sm text-gray-800 dark:text-white truncate">${p.nombre||''}</p>
                            <p class="text-xs text-gray-500">${p.categoria||''} · Stock: ${p.stock_puntoventa||0}</p>
                        </div>
                        <span class="font-bold text-emerald-600 text-sm flex-shrink-0">$${(p.precio_venta||0).toFixed(2)}</span>
                    </button>`).join('');
                drop.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!document.getElementById('posSearchWrap')?.contains(e.target)) {
                    drop.classList.add('hidden');
                }
            }, { capture: true });
        }

        window.setPOSCat = function(cat) {
            posCatFilter = cat;
            const rank = getSalesRanking();
            const grid = document.getElementById('posProductGrid');
            if (grid) {
                const list = getPOSProducts('', cat);
                grid.querySelector('.grid').innerHTML = list.map(p => renderPOSCard(p, rank)).join('') ||
                    `<div class="col-span-4 text-center py-12 text-gray-400"><div class="text-5xl mb-3">🔍</div><p>Sin productos en esta categoría</p></div>`;
            }
            // Actualizar estilos de tabs
            document.querySelectorAll('.cat-tab').forEach(btn => {
                const isCurrent = btn.getAttribute('onclick') === `window.setPOSCat('${cat}')`;
                btn.classList.toggle('bg-emerald-600', isCurrent);
                btn.classList.toggle('text-white', isCurrent);
                btn.classList.toggle('shadow-md', isCurrent);
                btn.classList.toggle('bg-white', !isCurrent && !btn.classList.contains('bg-purple-100'));
                btn.classList.toggle('dark:bg-slate-700', !isCurrent && !btn.classList.contains('bg-purple-100'));
                btn.classList.toggle('text-gray-700', !isCurrent && !btn.classList.contains('text-purple-700'));
                btn.classList.toggle('border-gray-200', !isCurrent && !btn.classList.contains('border-purple-200'));
            });
        };

        window.posAddProduct = function(productId) {
            const product = inventory.find(p => p.id === productId);
            if (!product) return;
            if ((product.stock_puntoventa||0) <= 0) {
                // Pequeño shake visual
                const btn = document.querySelector(`[onclick="window.posAddProduct(${productId})"]`);
                if (btn) { btn.style.border = '2px solid #ef4444'; setTimeout(() => btn.style.border = '', 500); }
                return;
            }
            if (!window.cart) window.cart = [];
            const existing = window.cart.find(i => i.id === productId);
            if (existing) {
                if ((product.stock_puntoventa||0) >= existing.cantidad + 1) {
                    existing.cantidad += 1;
                } else { return; }
            } else {
                window.cart.push({ ...product, cantidad: 1 });
            }
            // Actualizar card visualmente sin re-renderizar todo
            const rank = getSalesRanking();
            const btn = document.querySelector(`.pos-card[onclick="window.posAddProduct(${productId})"]`);
            if (btn) btn.outerHTML = renderPOSCard(product, rank);
            refreshCartPanels();
        };

        window.addAgrupacionToCart = function(agrupacionId) {
            const ag = agrupaciones.find(a => a.id === agrupacionId);
            if (!ag || !ag.producto_id) return;
            const p = inventory.find(x => x.id === ag.producto_id);
            if (!p) return;
            const totalNecesario = ag.cantidad;
            if ((p.stock_puntoventa||0) < totalNecesario) {
                alert(`Stock insuficiente para "${ag.nombre}". Necesitas ${totalNecesario}, hay ${p.stock_puntoventa||0}.`);
                return;
            }
            if (!window.cart) window.cart = [];
            const pVenta = ag.precio_especial > 0 ? ag.precio_especial : (p.precio_venta||0) * ag.cantidad;
            const existing = window.cart.find(i => i.id === p.id && i._agrupacion === ag.id);
            if (existing) {
                if ((p.stock_puntoventa||0) >= (existing.cantidad + 1) * ag.cantidad) existing.cantidad++;
                else { alert('No hay más stock'); return; }
            } else {
                window.cart.push({ ...p, nombre: ag.nombre, cantidad: 1, precio_venta: pVenta, margen: pVenta - (p.precio_compra||0)*ag.cantidad, _agrupacion: ag.id, _unidades: ag.cantidad });
            }
            refreshCartPanels();
        };

        window.cartQty = function(idx, delta) {
            if (!window.cart || !window.cart[idx]) return;
            const item = window.cart[idx];
            const newQty = (item.cantidad||1) + delta;
            if (newQty <= 0) { window.cart.splice(idx, 1); }
            else {
                const p = inventory.find(x => x.id === item.id);
                const maxStock = p ? (p.stock_puntoventa||0) : 999;
                item.cantidad = Math.min(newQty, maxStock);
            }
            refreshCartPanels();
        };

        window.cartSetQty = function(idx, val) {
            if (!window.cart || !window.cart[idx]) return;
            const q = parseInt(val);
            if (isNaN(q) || q <= 0) { window.cart.splice(idx, 1); }
            else {
                const item = window.cart[idx];
                const p = inventory.find(x => x.id === item.id);
                const maxStock = p ? (p.stock_puntoventa||0) : 999;
                item.cantidad = Math.min(q, maxStock);
            }
            refreshCartPanels();
        };

        window.clearCart = function() {
            if (confirm('¿Vaciar el carrito?')) { window.cart = []; refreshCartPanels(); }
        };

        window.setPosPayMethod = function(m) {
            window.posPayMethod = m;
            document.querySelectorAll('.pay-btn').forEach(btn => {
                const isSel = btn.getAttribute('onclick') === `window.setPosPayMethod('${m}')`;
                btn.classList.toggle('border-emerald-500', isSel);
                btn.classList.toggle('bg-emerald-50', isSel);
                btn.classList.toggle('text-emerald-700', isSel);
                btn.classList.toggle('border-gray-200', !isSel);
                btn.classList.toggle('text-gray-600', !isSel);
            });
        };

        window.toggleCartPanel = function() {
            const overlay = document.getElementById('cartOverlay');
            if (overlay) overlay.classList.toggle('hidden');
        };

        window.removeFromCart = function(idx) {
            if (window.cart) { window.cart.splice(idx, 1); refreshCartPanels(); }
        };

        function updateCartDisplay() { refreshCartPanels(); }

        window.addToCart = function(product) { window.posAddProduct(product.id); };

        window.processSale = function() {
            if (!window.cart || window.cart.length === 0) return;
            const total = window.cart.reduce((s,i) => s+(i.precio_venta||0)*(i.cantidad||0), 0);
            const ganancia = window.cart.reduce((s,i) => s+(i.margen||0)*(i.cantidad||0), 0);
            const metodo = window.posPayMethod || 'efectivo';

            if (metodo === 'transferencia') {
                // Bloquear hasta confirmar recepción
                window._confirmarTransferencia(total, ganancia);
                return;
            }
            // Efectivo: capturar billete y calcular cambio
            const billete = window._lastBillete || 0;
            const cambio = billete > 0 ? Math.max(0, billete - total) : 0;
            if (billete > 0 && billete < total) {
                alert(`⚠️ Pago insuficiente. El cliente necesita ${(total - billete).toFixed(2)} más.`);
                return;
            }
            _finalizarVenta(total, ganancia, metodo, billete, cambio);
        };

        window._confirmarTransferencia = function(total, ganancia) {
            document.querySelectorAll('.modal').forEach(m => m.remove());
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'transferModal';
            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
                <div class="p-5 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-t-2xl text-center">
                    <div class="text-5xl mb-2">📲</div>
                    <h2 class="text-xl font-bold">Confirmar Transferencia</h2>
                    <p class="text-3xl font-black mt-2">$${total.toFixed(2)}</p>
                </div>
                <div class="p-5 space-y-4">
                    <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-4 text-center">
                        <p class="text-sm text-blue-800 dark:text-blue-300 font-medium">Solicita al cliente que muestre el comprobante de transferencia antes de confirmar.</p>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Referencia o número de confirmación (opcional)</label>
                        <input type="text" id="transRef" placeholder="Ej: Folio 12345, últimos 4 dígitos..."
                            class="w-full px-3 py-2 border-2 border-gray-200 dark:border-slate-600 rounded-xl dark:bg-slate-700 text-sm focus:border-blue-400 outline-none">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window._aprobarTransferencia(${total.toFixed(4)}, ${ganancia.toFixed(4)})"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white py-3 rounded-xl font-bold transition-all">
                            ✅ Confirmar — Recibí el pago
                        </button>
                    </div>
                    <button onclick="this.closest('.modal').remove()"
                        class="w-full text-sm text-gray-400 hover:text-gray-600 py-2">
                        Cancelar — El pago aún no llega
                    </button>
                </div>
            </div>`;
            document.body.appendChild(modal);
        };

        window._aprobarTransferencia = function(total, ganancia) {
            const ref = document.getElementById('transRef')?.value?.trim() || '';
            document.querySelectorAll('.modal').forEach(m => m.remove());
            _finalizarVenta(total, ganancia, 'transferencia', 0, 0, ref);
        };

        function _finalizarVenta(total, ganancia, metodo, billete, cambio, ref) {
            const cartSnapshot = [...(window.cart||[])];
            cartSnapshot.forEach(item => {
                const product = inventory.find(p => p.id === item.id);
                if (product) {
                    const unidades = (item._unidades||1)*(item.cantidad||0);
                    product.stock_puntoventa = Math.max(0,(product.stock_puntoventa||0)-unidades);
                    registerMovement(item.id,'Venta',unidades,'punto_venta','cliente',`Venta POS · ${metodo}${ref?' · Ref:'+ref:''}`);
                }
            });
            const sale = {
                id: (sales.length ? Math.max(...sales.map(s=>s.id)) : 0)+1,
                total, ganancia, metodo_pago: metodo,
                billete_pago: billete, cambio_dado: cambio,
                referencia_trans: ref || null,
                usuario_id: currentUser?.id,
                productos: cartSnapshot.map(c=>({id:c.id,nombre:c.nombre,cantidad:(c._unidades||1)*(c.cantidad||0)})),
                fecha: new Date().toISOString()
            };
            sales.push(sale);
            saveData();
            window.cart = [];
            window._lastBillete = 0;
            window._lastCambio = 0;
            document.getElementById('cartOverlay')?.classList.add('hidden');

            // Ticket rápido en pantalla
            const lines = cartSnapshot.map(i=>`  ${(i.nombre||'').padEnd(20).slice(0,20)} ×${i.cantidad}  $${((i.precio_venta||0)*(i.cantidad||0)).toFixed(2)}`).join('\n');
            let resumen = `✅ VENTA REGISTRADA\n${'─'.repeat(32)}\n${lines}\n${'─'.repeat(32)}\nTOTAL: $${total.toFixed(2)}\nPago: ${metodo}`;
            if (billete > 0) resumen += `\nEfectivo: $${billete.toFixed(2)}\nCambio: $${cambio.toFixed(2)}`;
            if (ref) resumen += `\nRef: ${ref}`;
            renderSalesView();
            alert(resumen);
        }
        
        // Tipos de entrada configurables
        let tiposEntrada = JSON.parse(localStorage.getItem('tiposEntrada')) || [
            { id: 1, nombre: 'Adulto', precio: null, activo: true },   // null = usa precioEntrada global
            { id: 2, nombre: 'Niño (3-10)',   precio: null, factor: 0.5, activo: true },
            { id: 3, nombre: 'Adulto Mayor',  precio: null, factor: 0.7, activo: true },
        ];
        function saveTiposEntrada() { localStorage.setItem('tiposEntrada', JSON.stringify(tiposEntrada)); }

        // Configuración de descuento grupal
        let grupoConfig = JSON.parse(localStorage.getItem('grupoConfig')) || { minPersonas: 10, descuentoDefault: 10 };
        function saveGrupoConfig() { localStorage.setItem('grupoConfig', JSON.stringify(grupoConfig)); }

        function precioTipo(t) {
            if (t.precio !== null && t.precio !== undefined) return t.precio;
            return precioEntrada * (t.factor || 1);
        }

        function renderPeopleView() {
            const container = document.getElementById('viewContainer');
            if (!container) return;

            const hoy = new Date().toDateString();
            const histHoy = (peopleCount.history || []).filter(h => new Date(h.fecha).toDateString() === hoy);

        window.cotTipoQty = function(tipoId, delta) {
            const inp = document.getElementById('cotTipo_' + tipoId);
            if (!inp) return;
            inp.value = Math.max(0, parseInt(inp.value||0) + delta);
            window.calcularCot();
        };

        window.calcularCot = function() {
            const tiposActivos = tiposEntrada.filter(t => t.activo !== false);
            let totalPersonas = 0;
            let subtotal = 0;
            let desglose = [];

            for (const t of tiposActivos) {
                const qty = parseInt(document.getElementById('cotTipo_' + t.id)?.value) || 0;
                if (qty > 0) {
                    const precio = precioTipo(t);
                    totalPersonas += qty;
                    subtotal += qty * precio;
                    desglose.push(`${qty}×${t.nombre}`);
                }
            }

            const descRow = document.getElementById('descuentoRow');
            if (descRow) descRow.classList.toggle('hidden', totalPersonas <= grupoConfig.minPersonas);

            const aplicarDesc = document.getElementById('cotAplicarDesc')?.checked && totalPersonas > grupoConfig.minPersonas;
            const descPct = aplicarDesc ? (parseFloat(document.getElementById('cotDescuento')?.value)||0) : 0;
            const descMonto = subtotal * (descPct/100);
            const total = subtotal - descMonto;
            window._cotTotal = total;
            window._cotPersonas = totalPersonas;
            window._cotDescuento = descPct;
            window._cotDesglose = desglose.join(', ');

            const resultado = document.getElementById('cotResultado');
            if (resultado) {
                if (totalPersonas === 0) {
                    resultado.innerHTML = `<p class="text-center text-gray-400 text-sm">Agrega personas para calcular</p>`;
                } else {
                    resultado.innerHTML = `
                    ${desglose.map(d => {
                        const [qty, ...resto] = d.split('×');
                        const nombre = resto.join('×');
                        const t = tiposActivos.find(x => x.nombre === nombre);
                        const precio = t ? precioTipo(t) : precioEntrada;
                        return `<div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">${d} × $${precio.toFixed(2)}</span><span>$${(parseInt(qty)*precio).toFixed(2)}</span></div>`;
                    }).join('')}
                    ${descMonto > 0 ? `<div class="flex justify-between text-sm text-amber-600"><span>🎁 Descuento grupo ${descPct}%</span><span>−$${descMonto.toFixed(2)}</span></div>` : ''}
                    <div class="flex justify-between font-bold text-xl border-t border-gray-200 dark:border-slate-600 pt-2 mt-1">
                        <span class="text-gray-800 dark:text-white">Total (${totalPersonas} personas)</span>
                        <span class="text-emerald-600">$${total.toFixed(2)}</span>
                    </div>`;
                }
            }
            // Deshabilitar cobrar si no hay personas
            const btn = document.getElementById('btnCobrarEntrada');
            if (btn) btn.disabled = totalPersonas === 0;
            window.calcularCambio();
        };

        window.calcularCambio = function() {
            const billete = parseFloat(document.getElementById('cotBillete')?.value) || 0;
            const total = window._cotTotal || 0;
            const cambioRow = document.getElementById('cotCambioRow');
            const cambioEl = document.getElementById('cotCambio');
            const label = document.getElementById('cotCambioLabel');
            if (!cambioRow || !cambioEl) return;
            if (billete <= 0 || total === 0) { cambioRow.classList.add('hidden'); return; }
            const cambio = billete - total;
            cambioRow.classList.remove('hidden');
            if (cambio < 0) {
                cambioRow.className = 'rounded-2xl p-4 bg-red-50 dark:bg-red-900/20 border border-red-200';
                cambioEl.className = 'text-4xl font-black text-red-600';
                cambioEl.textContent = `Faltan $${Math.abs(cambio).toFixed(2)}`;
                if (label) { label.textContent = '⚠️ Pago insuficiente:'; label.className = 'font-bold text-lg text-red-700 dark:text-red-400'; }
            } else {
                cambioRow.className = 'rounded-2xl p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200';
                cambioEl.className = 'text-4xl font-black text-emerald-600';
                cambioEl.textContent = `$${cambio.toFixed(2)}`;
                if (label) { label.textContent = cambio === 0 ? '✅ Pago exacto' : '💵 Cambio a dar:'; label.className = 'font-bold text-lg'; }
            }
        };

        window.cobrarEntrada = function() {
            const totalPersonas = window._cotPersonas || 0;
            if (totalPersonas === 0) { alert('Agrega al menos una persona'); return; }
            const total = window._cotTotal || 0;
            const descPct = window._cotDescuento || 0;
            const desglose = window._cotDesglose || '';

            if (!peopleCount.history) peopleCount.history = [];
            peopleCount.total = (peopleCount.total || 0) + totalPersonas;
            peopleCount.history.push({
                id: peopleCount.history.length + 1,
                accion: 'entrada',
                cantidad: totalPersonas,
                cobrado: total,
                descuento: descPct,
                desglose,
                usuario_id: currentUser?.id,
                usuario_nombre: currentUser?.nombre,
                fecha: new Date().toISOString()
            });
            saveData();
            renderPeopleView();
        };

        window.showTiposEntradaModal = function() {
            document.querySelectorAll('.modal').forEach(m => m.remove());
            const modal = document.createElement('div');
            modal.className = 'modal';
            const renderT = () => tiposEntrada.map((t,i) => `
                <div class="flex items-center gap-2 p-3 rounded-xl bg-gray-50 dark:bg-slate-700 ${t.activo===false?'opacity-50':''}">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold">${t.nombre}</p>
                        <p class="text-xs text-gray-500">$${precioTipo(t).toFixed(2)} · factor: ${(t.factor||1).toFixed(1)}×</p>
                    </div>
                    <button onclick="window._toggleTipoEntrada(${i})" class="p-1 ${t.activo===false?'text-gray-400':'text-emerald-500'}">
                        <i class="fas fa-${t.activo===false?'eye-slash':'eye'} text-xs"></i>
                    </button>
                    <button onclick="window._deleteTipoEntrada(${i})" class="p-1 text-red-400"><i class="fas fa-trash text-xs"></i></button>
                </div>`).join('');

            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden">
                <div class="p-5 bg-gradient-to-r from-purple-500 to-indigo-600 text-white rounded-t-2xl flex justify-between">
                    <h2 class="font-bold">🎟️ Tipos de Entrada y Precios</h2>
                    <button onclick="this.closest('.modal').remove()" class="hover:bg-white/20 rounded p-1"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 overflow-y-auto flex-1 space-y-4">
                    <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3">
